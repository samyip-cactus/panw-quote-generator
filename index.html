      }, [historyQuotes]);

      const fetchHistory = async () => {
        if (!db) return;
        setIsLoadingHistory(true);
        try {
          const { collection, getDocs } = fb;
          const snapshot = await getDocs(collection(db, 'quote_history'));
          const quotes = snapshot.docs.map(doc => doc.data());
          setHistoryQuotes(quotes);
        } catch (error) {
          console.error("無法載入歷史報價:", error);
          setToastMessage('無法載入歷史記錄。');
          setTimeout(() => setToastMessage(''), 3000);
        } finally {
          setIsLoadingHistory(false);
        }
      };

      useEffect(() => {
        if (viewMode === 'history') {
          fetchHistory();
        }
      }, [viewMode]);

      useEffect(() => {
        if (historyQuotes.length > 0) {
          handleApplyHistoryFilters();
        }
      }, [historyQuotes]);

      const handleApplyHistoryFilters = () => {
        let filtered = historyQuotes.filter(q => {
          // Date
          const qDate = q.CreatedAt ? q.CreatedAt.split('T')[0] : '';
          if (qDate && filterDateFrom && qDate < filterDateFrom) return false;
          if (qDate && filterDateTo && qDate > filterDateTo) return false;

          // Prepared By
          if (filterPreparedBy.length > 0 && !filterPreparedBy.includes(q.PreparedBy)) return false;

          // Reseller
          if (filterReseller && !(q.ResellerName || '').toLowerCase().includes(filterReseller.toLowerCase())) return false;

          // End User
          if (filterEndUser && !(q.EndUserName || '').toLowerCase().includes(filterEndUser.toLowerCase())) return false;

          return true;
        });

        // Sort by CreatedAt desc
        filtered.sort((a, b) => new Date(b.CreatedAt || 0).getTime() < new Date(a.CreatedAt || 0).getTime() ? 1 : -1);

        setFilteredQuotes(filtered);
        setHistoryPage(1);
      };

      const handleTogglePreparedBy = (name) => {
        setFilterPreparedBy(prev =>
            prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]
        );
      };

      const loadQuoteToGenerator = (quote, mode) => {
         setCurrency(quote.Currency || 'HKD');
         setStrategy(quote.AppliedStrategy || 'Standard');
         setIsNoIncentive(quote.IsNoIncentive || false);
         if (quote.OverallDiscount) {
            setDiscountType(quote.OverallDiscount.type || '%');
            setDiscountInput(quote.OverallDiscount.value ? quote.OverallDiscount.value.toString() : '');
            setAppliedOverallDiscount(quote.OverallDiscount);
         } else {
            handleResetOverallDiscount();
         }

         setResellerName(quote.ResellerName || '');
         setEndUserName(quote.EndUserName || '');
         setValidDate(quote.QuoteValidDate || getDefaultValidDate());
         setIsUnofficial(quote.IsUnofficial || false);

         if (mode === 'revise') {
            setQuoteId(quote.QuoteID);
            setCreatedAt(quote.CreatedAt);
         } else { 
            const now = Date.now();
            setQuoteId(`QT-${now}`);
            setCreatedAt(new Date(now).toISOString());
         }

         // Rebuild cart items
         const newCart = (quote.Items || []).map(item => {
            let prod = products.find(p => p.SKU === item.SKU);
            if (!prod) {
               prod = {
                  SKU: item.SKU,
                  Description: item.Description,
                  Product_class: item.ProductClass || 'Other',
                  Product_type: 'Unknown',
                  Unit_list_price: item.ListPrice / exchangeRate, 
               };
            }
            return {
               id: `${item.SKU}_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
               product: prod,
               qty: item.Qty || 1,
               termMonths: item.Term || 0,
               manualDiscount: item.Discount,
               manualMargin: item.Margin,
               manualListPrice: item.ListPrice
            };
         });

         setCart(newCart);
         setViewMode('generator');
         setToastMessage(`已載入報價單 ${quote.QuoteID} (${mode === 'clone' ? 'Clone' : 'Revise'})`);
         setTimeout(() => setToastMessage(''), 3000);
      };

      const displayedQuotes = filteredQuotes.slice(0, historyPage * 20);

      // ===============================
      // End History View Logic
      // ===============================

      useEffect(() => {
        setCart(prev => prev.map(item => ({ ...item, manualDiscount: null, manualMargin: null, manualListPrice: null })));
      }, [strategy]);

      const handleCurrencyChange = (e) => {
        const newCurrency = e.target.value;
        if (newCurrency === currency) return;

        setCart(prev => prev.map(item => {
          if (item.manualListPrice !== null) {
            let convertedPrice = item.manualListPrice;
            if (currency === 'USD' && newCurrency === 'HKD') {
              convertedPrice = item.manualListPrice * 7.85;
            } else if (currency === 'HKD' && newCurrency === 'USD') {
              convertedPrice = item.manualListPrice / 7.85;
            }
            return { ...item, manualListPrice: convertedPrice };
          }
          return item;
        }));
        setCurrency(newCurrency);
      };

      const toggleFilter = (setState, val) => {
        setState(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
      };

      const searchResults = useMemo(() => {
        if (!searchQuery.trim()) return [];
        
        const preFiltered = products.filter(p => {
          const isRenewProduct = p.Is_Renew === true || String(p.Is_Renew).toUpperCase() === 'TRUE';
          if (isRenewProduct) return false;

          const isHAProduct = p.Is_HA === true || String(p.Is_HA).toUpperCase() === 'TRUE';
          if (filterIsHA && !isHAProduct) return false;
          if (!filterIsHA && isHAProduct) return false;

          const matchType = filterProductType.length === 0 || filterProductType.includes(p.Product_type);
          const matchClass = filterProductClass.length === 0 || filterProductClass.includes(p.Product_class);
          
          return matchType && matchClass;
        });

        const terms = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
        
        return preFiltered.filter(p => {
          const docId = (p.id || p.SKU || '').toLowerCase();
          const desc = (p.Description || '').toLowerCase();
          return terms.every(term => docId.includes(term) || desc.includes(term));
        }).slice(0, 20);
      }, [searchQuery, products, filterProductType, filterProductClass, filterIsHA]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (searchContainerRef.current && !searchContainerRef.current.contains(event.target)) {
            setIsSearching(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const addToCart = (product) => {
        const newItemId = `${product.SKU}_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
        let initialTerm = product.Term_months !== undefined ? Number(product.Term_months) : 12;
        const skuUpper = product.SKU.toUpperCase();

        if (initialTerm > 60) initialTerm = 60;
        if (skuUpper.includes('-3YR') && initialTerm < 36) initialTerm = 36;
        if (skuUpper.includes('-5YR') && initialTerm < 60) initialTerm = 60;

        setCart(prev => [...prev, {
          id: newItemId, product, qty: 1, termMonths: initialTerm, manualDiscount: null, manualMargin: null, manualListPrice: null
        }]);
        setSearchQuery('');
        setIsSearching(false);
      };

      const removeRow = (id) => setCart(prev => prev.filter(item => item.id !== id));
      
      const duplicateRow = (id) => {
        setCart(prev => {
          const index = prev.findIndex(item => item.id === id);
          if (index === -1) return prev;
          const itemToCopy = prev[index];
          const newItem = {
            ...itemToCopy,
            id: `${itemToCopy.product.SKU}_${Date.now()}_${Math.floor(Math.random() * 1000)}`
          };
          const newCart = [...prev];
          newCart.splice(index + 1, 0, newItem);
          return newCart;
        });
      };

      const updateRow = (id, field, value) => {
        setCart(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
      };

      const handleTermBlur = (id, sku, val) => {
        let term = parseInt(val, 10);
        if (isNaN(term)) term = 12;
        
        const skuUpper = sku.toUpperCase();
        if (term > 60) term = 60;
        if (skuUpper.includes('-3YR') && term < 36) term = 36;
        if (skuUpper.includes('-5YR') && term < 60) term = 60;

        updateRow(id, 'termMonths', term);
      };

      const handleApplyOverallDiscount = () => {
        const val = parseFloat(discountInput);
        if (!isNaN(val) && val >= 0) {
          setAppliedOverallDiscount({ type: discountType, value: val });
        } else {
          setAppliedOverallDiscount({ type: '%', value: 0 });
        }
      };

      const handleResetOverallDiscount = () => {
        setDiscountType('%');
        setDiscountInput('');
        setAppliedOverallDiscount({ type: '%', value: 0 });
      };

      const handleBulkUpdateQty = () => {
        const newQty = parseInt(bulkQty, 10);
        if (!isNaN(newQty) && newQty > 0) {
          setCart(prev => prev.map(item => ({ ...item, qty: newQty })));
          setToastMessage('已統一更新數量！');
          setTimeout(() => setToastMessage(''), 3000);
        }
      };

      const handleBulkUpdateMargin = () => {
        const newMargin = parseFloat(bulkMargin);
        if (!isNaN(newMargin) && newMargin >= 0) {
          setCart(prev => prev.map(item => ({ ...item, manualMargin: newMargin / 100 })));
          setToastMessage('已統一更新 Margin！');
          setTimeout(() => setToastMessage(''), 3000);
        }
      };

      const handleToggleUnofficial = () => {
        if (!isUnofficial) {
          setResellerName('');
          setEndUserName('');
        }
        setIsUnofficial(!isUnofficial);
      };

      const getCalculatedRow = (item) => {
        const { product, qty, termMonths, manualDiscount, manualMargin, manualListPrice } = item;
        
        let listPriceUSD = Number(product.Unit_list_price);
        if (isNaN(listPriceUSD)) listPriceUSD = 0;

        const defaultListPrice = listPriceUSD * exchangeRate;
        const listPrice = manualListPrice !== null ? manualListPrice : defaultListPrice;
        
        const defaultDiscount = product[STRATEGIES[strategy]] || 0;
        const appliedDiscount = manualDiscount !== null ? manualDiscount : defaultDiscount;
        
        let termMultiplier = 1;
        if (termMonths !== 0) {
          const skuUpper = product.SKU.toUpperCase();
          if (skuUpper.includes('-3YR')) {
            termMultiplier = termMonths / 36;
          } else if (skuUpper.includes('-5YR')) {
            termMultiplier = termMonths / 60;
          } else {
            termMultiplier = termMonths / 12;
          }
        }

        const distyCost = listPrice * (1 - appliedDiscount) * qty * termMultiplier; 
        
        const defaultMargin = strategy === 'VELOCI Program' ? (product.Disty_margin_Veloci || 0.1) : (product.Disty_margin || 0.15);
        const appliedMargin = manualMargin !== null ? manualMargin : defaultMargin;
        
        const incentiveUSD = isNoIncentive ? 0 : ((product.Incentive_coupon || 0) + (product.Incentive_gift || 0));
        const incentivePool = incentiveUSD * exchangeRate;
        
        let extendedPriceRaw = 0;
        if (appliedMargin < 1) {
          extendedPriceRaw = (distyCost / (1 - appliedMargin)) + incentivePool;
        }

        let extendedPrice = currency === 'HKD' ? Math.round(extendedPriceRaw / 10) * 10 : Math.round(extendedPriceRaw);
        return { listPrice, appliedDiscount, distyCost, appliedMargin, incentivePool, extendedPrice };
      };

      const groupedCart = useMemo(() => {
        const groups = { "Product": [], "Support": [], "Subscription": [], "HW Accessory": [], "Miscellaneous": [], "Other": [] };

        cart.forEach(item => {
          const pClass = item.product.Product_class;
          if (groups[pClass]) {
            groups[pClass].push(item);
          } else {
            groups["Other"].push(item);
          }
        });

        const sortedItems = [];
        
        ["Product", "Support", "Subscription", "HW Accessory", "Miscellaneous", "Other"].forEach(c => {
          if (groups[c] && groups[c].length > 0) {
            sortedItems.push({ type: 'header', title: c, id: `header-${c}` });
            sortedItems.push(...groups[c].map(item => ({ type: 'item', ...item })));
          }
        });
        
        return sortedItems;
      }, [cart]);

      const subTotalAmount = cart.reduce((sum, item) => sum + getCalculatedRow(item).extendedPrice, 0);
      
      let overallDiscountAmount = 0;
      if (appliedOverallDiscount.value > 0) {
        if (appliedOverallDiscount.type === '$') {
          overallDiscountAmount = appliedOverallDiscount.value; 
        } else {
          overallDiscountAmount = subTotalAmount * (appliedOverallDiscount.value / 100);
        }
      }
      
      const totalAmount = Math.max(0, subTotalAmount - overallDiscountAmount);
      const totalBookingToVendor = cart.reduce((sum, item) => sum + getCalculatedRow(item).distyCost, 0);
      const totalOtherCost = cart.reduce((sum, item) => sum + getCalculatedRow(item).incentivePool, 0);
      const totalGrossMarginAmount = totalAmount - totalBookingToVendor - totalOtherCost;
      const totalGrossMarginPercent = totalAmount > 0 ? (totalGrossMarginAmount / totalAmount) * 100 : 0;

      const saveQuotation = async (finalValidDate) => {
        if (cart.length === 0) return;
        const quotationData = {
          QuoteID: quoteId,
          Date: new Date().toISOString(), // 代表此版本的最後更新日期
          QuoteValidDate: finalValidDate || validDate,
          CreatedAt: createdAt, // 保留最初創建時間
          UpdatedAt: new Date().toISOString(), 
          Currency: currency, AppliedStrategy: strategy,
          IsNoIncentive: isNoIncentive, OverallDiscount: appliedOverallDiscount,
          SubTotal: subTotalAmount, TotalAmount: totalAmount,
          ResellerName: resellerName || 'Unknown',
          EndUserName: endUserName || 'Unknown',
          PreparedBy: displayUserName,
          IsUnofficial: isUnofficial,
          Items: groupedCart.filter(row => row.type === 'item').map(item => {
            const calc = getCalculatedRow(item);
            return {
              ProductClass: item.product.Product_class, 
              SKU: item.product.SKU, Description: item.product.Description, Qty: item.qty, Term: item.termMonths,
              ListPrice: calc.listPrice, Discount: calc.appliedDiscount, DistyCost: calc.distyCost,
              Margin: calc.appliedMargin, ExtendedPrice: calc.extendedPrice
            };
          })
        };

        if (isMockMode || !db || !user) {
          console.log("=== 準備寫入 (模擬模式) ===", JSON.stringify(quotationData, null, 2));
          return;
        }

        try {
          const { collection, doc, setDoc } = fb;
          const quotationsRef = collection(db, 'quote_history');
          // 3. 使用 setDoc 與固定的 quoteId 進行覆寫，取代 addDoc 的隨機增生
          const quoteDocRef = doc(quotationsRef, quoteId);
          await setDoc(quoteDocRef, quotationData, { merge: true });
        } catch (error) {
          console.error("儲存失敗:", error);
          alert("儲存報價單失敗：" + error.message);
        }
      };

      const handleGenerateQuote = async () => {
        let finalValidDate = validDate;
        if (!finalValidDate) {
          finalValidDate = getDefaultValidDate();
          setValidDate(finalValidDate);
        }

        if (!isUnofficial) {
          if (!resellerName.trim() || !endUserName.trim()) {
            setValidationError('Reseller Name and End User Name are required for official quotes.');
            return;
          }
          setValidationError('');
          await saveQuotation(finalValidDate);
        } else {
          setValidationError('');
          // 非正式報價跳過儲存
        }
        
        setIsPreview(true);
      };

      const formatMoney = (val, hideDecimals = false) => {
        return new Intl.NumberFormat('en-US', {
          style: 'currency', currency: currency, 
          minimumFractionDigits: hideDecimals ? 0 : 2, maximumFractionDigits: hideDecimals ? 0 : 2
        }).format(val);
      };

      const exportToExcel = async () => {
        if (isUnofficial) return; 
        try {
          if (typeof window.ExcelJS === 'undefined') {
            alert("Excel 匯出模組尚未載入完成，請確認網路連線或重新整理網頁。");
            return;
          }
          
          const ExcelJS = window.ExcelJS;
          const workbook = new ExcelJS.Workbook();
          const worksheet = workbook.addWorksheet('Quotation');

          worksheet.columns = [
            { header: '', key: 'sku', width: 25 },
            { header: '', key: 'desc', width: 50 },
            { header: '', key: 'qty', width: 10 },
            { header: '', key: 'term', width: 15 },
            { header: '', key: 'unitPrice', width: 20 },
            { header: '', key: 'extPrice', width: 25 }
          ];

          const titleRow = worksheet.addRow([isUnofficial ? 'UNOFFICIAL QUOTATION' : 'OFFICIAL QUOTATION']);
          titleRow.font = { size: 16, bold: true };
          worksheet.addRow(['Date:', new Date().toLocaleDateString()]);
          worksheet.addRow(['Quote Valid Date:', validDate]);
          worksheet.addRow(['Reseller Name:', resellerName || '____________________']);
          worksheet.addRow(['End User Name:', endUserName || '____________________']);
          worksheet.addRow(['Prepared by:', displayUserName]);
          worksheet.addRow(['Currency:', currency]);
          worksheet.addRow([]); 

          const headerLabels = ['SKU / Item', 'Description', 'Qty', 'Term (MONTHS)', `Unit Price (${currency})`, `Reseller Extended Price (${currency})`];
          const headerRow = worksheet.addRow(headerLabels);
          headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } }; 
          headerRow.eachCell(cell => {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF005596' } }; 
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
          });

          groupedCart.forEach(row => {
            if (row.type === 'header') {
              const groupRow = worksheet.addRow([row.title]);
              groupRow.font = { bold: true, color: { argb: 'FF333333' } };
              groupRow.eachCell(cell => {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } }; 
                cell.alignment = { vertical: 'middle' };
              });
              worksheet.mergeCells(`A${groupRow.number}:F${groupRow.number}`);
            } else {
              const calc = getCalculatedRow(row);
              const unitPrice = row.qty > 0 ? calc.extendedPrice / row.qty : 0;
              const termVal = row.termMonths == 0 ? '-' : row.termMonths;

              const dataRow = worksheet.addRow([
                row.product.SKU,
                row.product.Description,
                row.qty,
                termVal,
                unitPrice,
                calc.extendedPrice
              ]);

              dataRow.getCell(5).numFmt = '#,##0.00';
              dataRow.getCell(6).numFmt = '#,##0'; 
              dataRow.getCell(3).alignment = { horizontal: 'center' };
              dataRow.getCell(4).alignment = { horizontal: 'center' };
            }
          });

          worksheet.addRow([]);
          if (appliedOverallDiscount.value > 0) {
            const subRow = worksheet.addRow(['', '', '', '', 'Subtotal:', subTotalAmount]);
            subRow.getCell(6).numFmt = '#,##0.00';
            const discRow = worksheet.addRow(['', '', '', '', `Discount (${appliedOverallDiscount.type === '%' ? appliedOverallDiscount.value + '%' : currency}):`, -overallDiscountAmount]);
            discRow.getCell(6).numFmt = '#,##0.00';
            discRow.font = { color: { argb: 'FFE01F26' } }; 
          }
          
          const totalRow = worksheet.addRow(['', '', '', '', 'Total Amount:', totalAmount]);
          totalRow.font = { bold: true, size: 12 };
          totalRow.getCell(6).numFmt = '#,##0.00';

          worksheet.addRow([]);
          worksheet.addRow([]);
          const tcLines = TERMS_AND_CONDITIONS.split('\n');
          tcLines.forEach(line => {
             const r = worksheet.addRow([line]);
             worksheet.mergeCells(`A${r.number}:F${r.number}`);
             r.getCell(1).font = { size: 9, color: { argb: 'FF666666' } };
             r.getCell(1).alignment = { wrapText: true, vertical: 'top' };
          });

          const buffer = await workbook.xlsx.writeBuffer();
          const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          window.saveAs(blob, `Quotation_${endUserName || 'Draft'}_${Date.now()}.xlsx`);
          
          setToastMessage('已成功匯出具有格式的 Excel！');
          setTimeout(() => setToastMessage(''), 3000);
        } catch (error) {
          console.error("Excel Export Error:", error);
          alert("匯出 Excel 時發生錯誤: " + (error.message || error));
        }
      };

      const handlePlaceholderAction = (actionName) => {
        alert(`功能尚未實作 (Placeholder): ${actionName}`);
      };

      // ----------------------------------------------------
      // 預覽與列印版面 (Print View)
      // ----------------------------------------------------
      if (isPreview) {
        return (
          <div className="min-h-screen bg-white text-on-surface font-body p-8 print:p-0">
            <div className="max-w-4xl mx-auto print-container">
              <div className="flex justify-between items-start mb-10 border-b-2 border-primary pb-6">
                <div>
                  <h1 className="text-3xl font-extrabold text-primary font-headline tracking-tight mb-2">
                    {isUnofficial ? 'UNOFFICIAL QUOTATION' : 'OFFICIAL QUOTATION'}
                  </h1>
                  <div className="space-y-1">
                    <p className="text-sm text-secondary font-label"><span className="font-semibold w-32 inline-block">Date:</span> {new Date().toLocaleDateString()}</p>
                    <p className="text-sm text-secondary font-label"><span className="font-semibold w-32 inline-block">Quote Valid Date:</span> {validDate}</p>
                    <p className="text-sm text-secondary font-label"><span className="font-semibold w-32 inline-block">Reseller:</span> {resellerName || '____________________'}</p>
                    <p className="text-sm text-secondary font-label"><span className="font-semibold w-32 inline-block">End User:</span> {endUserName || '____________________'}</p>
                    <p className="text-sm text-secondary font-label"><span className="font-semibold w-32 inline-block">Prepared by:</span> {displayUserName}</p>
                  </div>
                </div>
                <div className="text-right flex flex-col items-end">
                  <img src="https://firebasestorage.googleapis.com/v0/b/panw-quote-generator.firebasestorage.app/o/IngramMicroLogo.png?alt=media" alt="Ingram Micro" className="h-6 w-auto mb-2" />
                  <p className="text-sm text-secondary font-label">Team Palo Alto Networks</p>
                  <p className="text-sm font-bold text-primary mt-2">Currency: {currency}</p>
                  
                  <div className="mt-4 no-print flex items-center justify-end gap-2">
                    <button onClick={exportToExcel} disabled={isUnofficial} className={`px-4 py-2 text-sm font-bold rounded-lg shadow-sm flex items-center gap-2 transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed' : 'bg-surface-container-high text-primary hover:bg-surface-variant border border-outline-variant/30'}`}>
                      <span className="material-symbols-outlined text-[18px]">download</span> Excel
                    </button>
                    <button onClick={() => window.print()} disabled={isUnofficial} className={`px-4 py-2 text-sm font-bold rounded-lg shadow-md flex items-center gap-2 transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed' : 'bg-primary text-on-primary hover:bg-primary-container'}`}>
                      <span className="material-symbols-outlined text-[18px]">print</span> 列印 PDF
                    </button>
                  </div>
                  <button onClick={() => setIsPreview(false)} className="mt-3 no-print text-secondary hover:text-on-surface text-sm flex items-center gap-1 justify-end w-full font-label transition-colors">
                    <span className="material-symbols-outlined text-[16px]">close</span> 退出預覽
                  </button>
                </div>
              </div>
              
              <table className="w-full border-collapse mb-8 text-sm font-body">
                <thead>
                  <tr className="bg-surface-container-low border-b border-outline-variant/30">
                    <th className="py-3 px-4 text-left font-bold text-primary font-label uppercase tracking-wider text-xs">SKU / Item</th>
                    <th className="py-3 px-4 text-left font-bold text-primary font-label uppercase tracking-wider text-xs">Description</th>
                    <th className="py-3 px-4 text-center font-bold text-primary font-label uppercase tracking-wider text-xs">Qty</th>
                    <th className="py-3 px-4 text-center font-bold text-primary font-label uppercase tracking-wider text-xs">Term (M)</th>
                    <th className="py-3 px-4 text-right font-bold text-primary font-label uppercase tracking-wider text-xs">Unit Price</th>
                    <th className="py-3 px-4 text-right font-bold text-primary font-label uppercase tracking-wider text-xs">Ext. Price</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-outline-variant/10">
                  {cart.length === 0 ? (

                                      </td>

                                      <td className="px-3 py-4 text-right text-secondary font-mono text-[12px]">{calc.incentivePool > 0 ? formatMoney(calc.incentivePool) : '-'}</td>
                                      
                                      <td className="px-4 py-4 text-right font-black text-primary bg-primary-fixed/10 font-mono text-[13px]">{formatMoney(calc.extendedPrice, true)}</td>
                                      
                                      <td className="px-2 py-4 text-center align-middle">
                                        <div className="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                          <button onClick={() => duplicateRow(item.id)} className="w-7 h-7 rounded bg-surface text-secondary hover:text-primary hover:bg-surface-container-high transition-colors flex items-center justify-center" title="Duplicate">
                                            <span className="material-symbols-outlined text-[16px]">content_copy</span>
                                          </button>
                                          <button onClick={() => removeRow(item.id)} className="w-7 h-7 rounded bg-surface text-secondary hover:text-brand-red hover:bg-error-container transition-colors flex items-center justify-center" title="Delete">
                                            <span className="material-symbols-outlined text-[16px]">delete</span>
                                          </button>
                                        </div>
                                      </td>
                                    </tr>
                                  );
                                })
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>

                    {/* Right Canvas: Summary & Settings */}
                    <div className="col-span-12 xl:col-span-3 space-y-6">
                      
                      {/* Blue Summary Card */}
                      <div className="bg-primary rounded-3xl p-6 text-on-primary shadow-xl relative overflow-hidden">
                        <div className="absolute -right-16 -top-16 w-64 h-64 bg-white rounded-full blur-3xl opacity-10 pointer-events-none"></div>
                        <div className="relative z-10">
                          <p className="text-primary-fixed text-[10px] font-black uppercase tracking-widest font-label mb-3">Quote Summary</p>
                          
                          <div className="space-y-4 text-sm font-label">
                            <div className="flex justify-between border-b border-white/20 pb-3">
                              <span className="text-inverse-primary font-medium">Subtotal</span>
                              <span className="font-bold font-mono">{formatMoney(subTotalAmount, true)}</span>
                            </div>
                            {appliedOverallDiscount.value > 0 && (
                              <div className="flex justify-between border-b border-white/20 pb-3">
                                <span className="text-tertiary-fixed font-medium">Overall Discount</span>
                                <span className="font-bold font-mono text-tertiary-fixed">-{formatMoney(overallDiscountAmount, true)}</span>
                              </div>
                            )}
                            <div className="flex justify-between pt-2 pb-4 border-b border-white/20">
                              <span className="text-white font-black">Total Amount</span>
                              <span className="text-white font-black text-xl font-mono tracking-tight">{formatMoney(totalAmount, true)}</span>
                            </div>
                            
                            {/* Costs & Margin grouped inside Summary */}
                            <div className="space-y-2 pt-2">
                               <div className="flex justify-between items-center">
                                <span className="text-[11px] text-inverse-primary uppercase tracking-wide font-bold">Booking to Vendor</span>
                                <span className="text-xs font-mono font-medium text-white">{formatMoney(totalBookingToVendor, true)}</span>
                              </div>
                              <div className="flex justify-between items-center">
                                <span className="text-[11px] text-inverse-primary uppercase tracking-wide font-bold">Other Cost</span>
                                <span className="text-xs font-mono font-medium text-white">{formatMoney(totalOtherCost, true)}</span>
                              </div>
                              <div className="flex justify-between items-center mt-2">
                                <span className="text-xs text-white font-black uppercase tracking-wide">Gross Margin</span>
                                <div className="flex items-center gap-2">
                                  <span className="text-sm font-mono font-bold text-white">{formatMoney(totalGrossMarginAmount, true)}</span>
                                  <span className="text-[9px] font-black text-brand-red bg-white px-1.5 py-0.5 rounded shadow-sm">
                                    {totalGrossMarginPercent.toFixed(1)}%
                                  </span>
                                </div>
                              </div>
                            </div>
                            
                          </div>
                        </div>
                      </div>

                      {/* Client Details Form */}
                      <div className="bg-surface-container-lowest rounded-2xl p-5 shadow-sm ring-1 ring-outline-variant/20">
                        <div className="flex justify-between items-center mb-5">
                          <h3 className="font-headline font-bold text-primary flex items-center gap-2">
                            <span className="material-symbols-outlined text-[18px]">person</span> Document Info
                          </h3>
                          <button onClick={handleToggleUnofficial} className={`px-3 py-1.5 text-[10px] font-black uppercase tracking-wider rounded-lg transition-colors ${isUnofficial ? 'bg-primary text-on-primary shadow-md' : 'bg-surface-container-highest text-secondary hover:bg-outline-variant/30'}`}>
                            {isUnofficial ? 'Unofficial' : 'Official'}
                          </button>
                        </div>
                        
                        <div className="space-y-4">
                          <div>
                            <label className="block text-[11px] font-bold text-secondary mb-1.5 uppercase tracking-wide">Quote Valid Date</label>
                            <input type="date" value={validDate} onChange={(e) => setValidDate(e.target.value)} disabled={isUnofficial}
                              className={`w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed placeholder-transparent' : 'bg-surface-container-lowest'}`} 
                            />
                          </div>
                          <div>
                            <label className="block text-[11px] font-bold text-secondary mb-1.5 uppercase tracking-wide">Reseller Name</label>
                            <input type="text" placeholder="e.g. Ingram Micro" value={resellerName} onChange={(e) => setResellerName(e.target.value)} disabled={isUnofficial}
                              className={`w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed placeholder-transparent' : 'bg-surface-container-lowest'}`} 
                            />
                          </div>
                          <div>
                            <label className="block text-[11px] font-bold text-secondary mb-1.5 uppercase tracking-wide">End User Name</label>
                            <input type="text" placeholder="e.g. Metropolis Tower" value={endUserName} onChange={(e) => setEndUserName(e.target.value)} disabled={isUnofficial}
                              className={`w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed placeholder-transparent' : 'bg-surface-container-lowest'}`} 
                            />
                          </div>
                        </div>
                      </div>

                      {/* Global Pricing Controls */}
                      <div className="bg-surface-container-low rounded-2xl p-5 border border-outline-variant/20 shadow-sm">
                        <h3 className="font-headline font-bold text-primary flex items-center gap-2 mb-5">
                          <span className="material-symbols-outlined text-[18px]">tune</span> Pricing Controls
                        </h3>
                        
                        <div className="space-y-5">
                          {/* Controls */}
                          <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                              <label className="text-[10px] font-bold text-secondary uppercase">Incentive</label>
                              <button onClick={() => setIsNoIncentive(!isNoIncentive)}
                                className={`w-full py-2 text-xs font-bold rounded-lg border transition-colors ${isNoIncentive ? 'bg-primary text-on-primary border-primary shadow-sm' : 'bg-surface-container-lowest text-secondary border-outline-variant/30 hover:bg-surface-container-highest'}`}
                              >Cancel Incentive</button>
                            </div>
                            
                            <div className="space-y-1.5">
                              <label className="text-[10px] font-bold text-secondary uppercase">Bulk Qty</label>
                              <div className="flex bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 focus-within:ring-1 focus-within:border-primary">
                                <input type="number" min="1" step="1" value={bulkQty} onChange={(e) => setBulkQty(e.target.value)} 
                                  className="w-full bg-transparent border-0 text-xs text-center font-bold font-mono focus:ring-0 p-0" />
                                <button onClick={handleBulkUpdateQty} className="px-2 bg-surface-container-high rounded text-[10px] font-bold text-primary hover:bg-primary hover:text-on-primary transition-colors">SET</button>
                              </div>
                            </div>
                            
                            <div className="space-y-1.5 col-span-2">
                              <label className="text-[10px] font-bold text-secondary uppercase">Bulk Margin (%)</label>
                              <div className="flex bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 focus-within:ring-1 focus-within:border-primary">
                                <input type="number" min="0" step="1" value={bulkMargin} onChange={(e) => setBulkMargin(e.target.value)} 
                                  className="w-full bg-transparent border-0 text-xs text-center font-bold font-mono focus:ring-0 p-0" />
                                <button onClick={handleBulkUpdateMargin} className="px-3 bg-surface-container-high rounded text-[10px] font-bold text-primary hover:bg-primary hover:text-on-primary transition-colors">SET</button>
                              </div>
                            </div>
                          </div>

                          <div className="pt-2 border-t border-outline-variant/20">
                            <label className="block text-[10px] font-bold text-secondary uppercase mb-2">Overall Discount</label>
                            <div className="flex items-center gap-2">
                              <div className="flex bg-surface-container-high rounded-lg p-0.5 shrink-0">
                                <button onClick={() => setDiscountType('$')} className={`px-2 py-1 text-xs font-bold rounded-md transition-colors ${discountType === '$' ? 'bg-white text-primary shadow-sm' : 'text-secondary hover:text-primary'}`}>$</button>
                                <button onClick={() => setDiscountType('%')} className={`px-2 py-1 text-xs font-bold rounded-md transition-colors ${discountType === '%' ? 'bg-white text-primary shadow-sm' : 'text-secondary hover:text-primary'}`}>%</button>
                              </div>
                              <input type="number" min="0" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="0" className="flex-1 min-w-0 bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-2 text-xs font-mono font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none" />
                              <button onClick={handleApplyOverallDiscount} className="px-2.5 py-1.5 text-[10px] font-black rounded-lg bg-primary text-on-primary hover:bg-primary-container transition-colors shadow-sm">SET</button>
                              <button onClick={handleResetOverallDiscount} className="px-2 py-1.5 text-[10px] font-black rounded-lg bg-surface-container-highest text-secondary hover:bg-brand-red hover:text-white transition-colors" title="Reset"><span className="material-symbols-outlined text-[14px]">refresh</span></button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                /* ========================================================
                   History View 
                   ======================================================== */
                <div className="space-y-8 fade-in">
                  <div className="flex justify-between items-end mb-8 border-b border-outline-variant/20 pb-6">
                    <div>
                      <h2 className="text-3xl font-black text-primary font-headline tracking-tight">Historic Quotes</h2>
                      <p className="text-sm text-secondary mt-1">Review, clone or revise your previously saved quotation documents.</p>
                    </div>
                    <button onClick={() => setViewMode('generator')} className="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest hover:bg-surface-container-low text-on-surface text-sm font-bold rounded-xl border border-outline-variant/30 transition-colors shadow-sm">
                      <span className="material-symbols-outlined text-[18px]">arrow_back</span> Back to Generator
                    </button>
                  </div>

                  {/* Filters Box */}
                  <div className="bg-surface-container-lowest rounded-2xl p-6 shadow-sm border border-outline-variant/20">
                    <div className="flex justify-between items-center mb-5">
                      <h3 className="font-headline font-bold text-primary flex items-center gap-2 text-lg">
                        <span className="material-symbols-outlined text-[20px]">filter_alt</span> Search Filters
                      </h3>
                      <button onClick={handleApplyHistoryFilters} className="px-5 py-2 bg-primary text-on-primary font-bold rounded-lg text-sm hover:bg-primary-container transition-colors shadow-sm">
                        Apply Filters
                      </button>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-6">
                      <div className="col-span-4 lg:col-span-1 space-y-1.5">
                        <label className="text-[11px] font-bold text-secondary uppercase tracking-wider">Date From</label>
                        <input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} className="w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none bg-surface" />
                      </div>
                      <div className="col-span-4 lg:col-span-1 space-y-1.5">
                        <label className="text-[11px] font-bold text-secondary uppercase tracking-wider">Date To</label>
                        <input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} className="w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none bg-surface" />
                      </div>
                      <div className="col-span-4 lg:col-span-1 space-y-1.5">
                        <label className="text-[11px] font-bold text-secondary uppercase tracking-wider">Reseller</label>
                        <input type="text" placeholder="Search Reseller..." value={filterReseller} onChange={e => setFilterReseller(e.target.value)} className="w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none bg-surface" />
                      </div>
                      <div className="col-span-4 lg:col-span-1 space-y-1.5">
                        <label className="text-[11px] font-bold text-secondary uppercase tracking-wider">End User</label>
                        <input type="text" placeholder="Search End User..." value={filterEndUser} onChange={e => setFilterEndUser(e.target.value)} className="w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none bg-surface" />
                      </div>
                      
                      <div className="col-span-4 border-t border-outline-variant/20 pt-4 mt-2">
                        <label className="block text-[11px] font-bold text-secondary uppercase tracking-wider mb-3">Created By (Multiple Selection)</label>
                        <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto pr-2 custom-scrollbar">
                          {uniquePreparedBy.map(name => (
                            <button 
                              key={name} 
                              onClick={() => handleTogglePreparedBy(name)} 
                              className={`px-3 py-1.5 text-[12px] font-bold rounded-lg transition-colors border ${filterPreparedBy.includes(name) ? 'bg-primary text-on-primary border-primary shadow-sm' : 'bg-surface text-secondary border-outline-variant/30 hover:bg-surface-container-highest'}`}
                            >
                              {name}
                            </button>
                          ))}
                          {uniquePreparedBy.length === 0 && <p className="text-xs text-secondary italic">No authors found in history.</p>}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* History Table */}
                  <div className="bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/20 overflow-hidden relative">
                    {isLoadingHistory && (
                      <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center">
                        <span className="material-symbols-outlined animate-spin text-primary text-4xl">autorenew</span>
                      </div>
                    )}
                    <div className="overflow-x-auto">
                      <table className="w-full text-left whitespace-nowrap">
                        <thead>
                          <tr className="bg-surface-container-low border-b border-outline-variant/20">
                            <th className="px-5 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label w-24 text-center">Actions</th>
                            <th className="px-4 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label">Quote ID</th>
                            <th className="px-4 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label">Date (Created)</th>
                            <th className="px-4 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label">Reseller</th>
                            <th className="px-4 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label">End User</th>
                            <th className="px-4 py-4 text-[10px] font-black text-secondary uppercase tracking-widest font-label">Prepared By</th>
                            <th className="px-4 py-4 text-[10px] font-black text-primary uppercase tracking-widest font-label text-right">Total Amount</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-outline-variant/10">
                          {displayedQuotes.length === 0 && !isLoadingHistory ? (
                            <tr>
                              <td colSpan="7" className="px-6 py-16 text-center text-secondary">
                                <span className="material-symbols-outlined text-4xl mb-2 text-outline-variant/50">search_off</span>
                                <p className="font-medium text-sm">No historical quotes found matching your filters.</p>
                              </td>
                            </tr>
                          ) : (
                            displayedQuotes.map(quote => (
                              <tr key={quote.QuoteID} className="hover:bg-surface-container-highest/30 transition-colors group">
                                <td className="px-5 py-3 text-center align-middle">
                                  <div className="flex items-center justify-center gap-1.5">
                                    <button onClick={() => loadQuoteToGenerator(quote, 'clone')} className="w-8 h-8 rounded-lg bg-surface border border-outline-variant/30 text-primary hover:bg-primary hover:text-on-primary transition-colors flex items-center justify-center shadow-sm" title="Clone as New Quote">
                                      <span className="material-symbols-outlined text-[16px]">file_copy</span>
                                    </button>
                                    <button onClick={() => loadQuoteToGenerator(quote, 'revise')} className="w-8 h-8 rounded-lg bg-surface border border-outline-variant/30 text-amber-600 hover:bg-amber-600 hover:text-white transition-colors flex items-center justify-center shadow-sm" title="Revise Existing Quote">
                                      <span className="material-symbols-outlined text-[16px]">edit_document</span>
                                    </button>
                                  </div>
                                </td>
                                <td className="px-4 py-3 font-bold text-on-surface text-[13px]">{quote.QuoteID}</td>
                                <td className="px-4 py-3 text-secondary text-[12px]">{new Date(quote.CreatedAt).toLocaleString()}</td>
                                <td className="px-4 py-3 text-secondary text-[13px] font-medium">{quote.ResellerName || '-'}</td>
                                <td className="px-4 py-3 text-secondary text-[13px] font-medium">{quote.EndUserName || '-'}</td>
                                <td className="px-4 py-3">
                                  <span className="px-2.5 py-1 bg-surface-container text-primary text-[10px] font-bold rounded-md">{quote.PreparedBy || 'Unknown'}</span>
                                </td>
                                <td className="px-4 py-3 text-right font-black text-on-surface font-mono text-[14px]">
                                  {new Intl.NumberFormat('en-US', { style: 'currency', currency: quote.Currency || 'HKD' }).format(quote.TotalAmount)}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                    {/* Pagination */}
                    {displayedQuotes.length < filteredQuotes.length && (
                      <div className="p-4 border-t border-outline-variant/20 bg-surface flex justify-center">
                        <button onClick={() => setHistoryPage(p => p + 1)} className="px-6 py-2 bg-surface-container-high text-primary font-bold rounded-lg text-sm border border-outline-variant/30 hover:bg-surface-container-highest transition-colors flex items-center gap-2">
                          <span className="material-symbols-outlined text-[18px]">expand_more</span> Load Next 20 Records
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    let isAppRendered = false;
    const mountReactApp = () => {
      if (isAppRendered) return;
      isAppRendered = true;
      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App fb={window.FirebaseLib} />);
    };

    window.addEventListener('firebase-loaded', mountReactApp);
    window.addEventListener('firebase-failed', mountReactApp);

    setTimeout(() => {
      if (!isAppRendered) {
        console.warn("模組載入逾時，強制以模擬模式啟動。");
        mountReactApp();
      }
    }, 2500);
  </script>
</body>
</html>
