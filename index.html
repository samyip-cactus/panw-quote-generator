  <!-- 全域錯誤攔截器 -->

      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      document.body.innerHTML += '<div style="position:fixed; top:0; left:0; right:0; background:#ffdad6; border-bottom:1px solid #ba1a1a; color:#93000a; padding:16px; z-index:9999; font-family:sans-serif; text-align:left;">' +

  <!-- Firebase 原生模組載入器 -->
  <script type="module">
    Promise.all([
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js')
    ]).then(([app, auth, firestore]) => {
      window.FirebaseLib = { ...app, ...auth, ...firestore };
      window.dispatchEvent(new Event('firebase-loaded'));
    }).catch(e => {
      console.error("Firebase module import failed:", e);
      window.dispatchEvent(new Event('firebase-failed'));
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const STRATEGIES = {
      'Standard': 'Discount_Std',
      'Deal Reg, Registered Partner': 'Discount_DR_Registered',
      'Deal Reg, Innovator': 'Discount_DR_Innovator',
      'Deal Reg, Platinum': 'Discount_DR_Platinum',
      'Deal Reg, Diamond': 'Discount_DR_Diamond',
      'VELOCI Program': 'Discount_Veloci',
      'Renew, Incumbent': 'Discount_Renew_Incumbent',
      'Renew, Non-incumbent': 'Discount_Renew_base'
    };

    const MOCK_PRODUCTS = [
      {
        Product_class: "Product", Product_group: "Platforms", Model: "PA-3220", SKU: "PAN-PA-3220",
        Description: "Palo Alto Networks PA-3220", Product_type: "Production",
        Unit_list_price: 18000, Term_months: 12, Is_Renew: "FALSE", Is_HA: "FALSE",
        Discount_Std: 0.13, Discount_DR_Registered: 0.29, Discount_DR_Innovator: 0.37, Discount_DR_Platinum: 0.39, Discount_DR_Diamond: 0.41,
        Discount_Renew_Incumbent: 0.0, Discount_Renew_base: 0.0, Discount_Veloci: 0.29,
        Incentive_coupon: 50, Incentive_gift: 100, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-3220", "pa-3220", "palo alto", "hardware"]
      },
      {
        Product_class: "Product", Product_group: "Platforms", Model: "PA-440", SKU: "PAN-PA-440",
        Description: "Palo Alto Networks PA-440", Product_type: "Production",
        Unit_list_price: 2000, Term_months: 12, Is_Renew: "FALSE", Is_HA: "FALSE",
        Discount_Std: 0.10, Discount_DR_Registered: 0.25, Discount_DR_Innovator: 0.30, Discount_DR_Platinum: 0.35, Discount_DR_Diamond: 0.40,
        Discount_Renew_Incumbent: 0.0, Discount_Renew_base: 0.0, Discount_Veloci: 0.30,
        Incentive_coupon: 10, Incentive_gift: 20, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-440", "pa-440", "palo alto", "hardware"]
      },
      {
        Product_class: "Subscription", Product_group: "Threat Prevention", Model: "TP-3220", SKU: "PAN-PA-3220-TP-3YR",
        Description: "Threat Prevention Subscription 3 Year", Product_type: "Subscription",
        Unit_list_price: 10800, Term_months: 36, Is_Renew: "TRUE", Is_HA: "FALSE",
        Discount_Std: 0.13, Discount_DR_Registered: 0.29, Discount_DR_Innovator: 0.37, Discount_DR_Platinum: 0.39, Discount_DR_Diamond: 0.41,
        Discount_Renew_Incumbent: 0.15, Discount_Renew_base: 0.05, Discount_Veloci: 0.25,
        Incentive_coupon: 0, Incentive_gift: 0, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-3220-tp-3yr", "threat prevention", "subscription", "renew"]
      }
    ];

    function App({ fb }) {
      const [user, setUser] = useState(null);
      const [appUnlocked, setAppUnlocked] = useState(false);
      const [userRole, setUserRole] = useState('GUEST');
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);

      const firebaseConfig = {
        apiKey: "AIzaSyDCY2xS1KH742gaDUDyK18M7LnA8ML0FOs",
        authDomain: "panw-quote-generator.firebaseapp.com",
        projectId: "panw-quote-generator",
        storageBucket: "panw-quote-generator.firebasestorage.app",
        messagingSenderId: "916390333344",
        appId: "1:916390333344:web:dbc3ba95b46cf0f13832c5",
        measurementId: "G-0NR1BTLYCJ"
      };

      const { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, getFirestore, collection, addDoc } = fb || {};

      const { auth, db, isMockMode } = useMemo(() => {
        if (!fb) return { isMockMode: true, auth: null, db: null };
        try {
          const app = initializeApp(firebaseConfig);
          return { auth: getAuth(app), db: getFirestore(app), isMockMode: false };
        } catch (err) {
          console.warn("Firebase 初始化失敗", err);
          return { isMockMode: true, auth: null, db: null };
        }
      }, [fb]);

      useEffect(() => {
        if (isMockMode || !auth) {
          setUser({ uid: 'mock-user' });
          return;
        }
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            setAppUnlocked(true);
            setUserRole('USER');
          } else {
            setUser(null);
            setAppUnlocked(false);
            setUserRole('GUEST');
          }
        });
        return () => unsubscribe();
      }, [auth, isMockMode]);

      useEffect(() => {
        if (!user) return;
        const fetchProductData = async () => {
          setLoading(true);
          try {
            let latestVersion = 'fallback_version';
            try {
              const versionResponse = await fetch(`version.json?_t=${Date.now()}`);
              if (versionResponse.ok) {
                const versionData = await versionResponse.json();
                latestVersion = versionData.version || String(Date.now());
              } else {
                latestVersion = String(Date.now()); 
              }
            } catch (err) {
              latestVersion = String(Date.now());
            }

            const CACHE_KEY_DATA = 'quote_gen_products_data';
            const CACHE_KEY_VERSION = 'quote_gen_products_version';
            
            const cachedVersion = localStorage.getItem(CACHE_KEY_VERSION);
            const cachedData = localStorage.getItem(CACHE_KEY_DATA);

            if (cachedVersion === latestVersion && cachedData) {
              console.log(`✅ 版本一致 (${latestVersion})，從快取載入`);
              setProducts(JSON.parse(cachedData));
              setLoading(false);
              return;
            }

            const productsResponse = await fetch(`products.json?v=${latestVersion}`);
            if (!productsResponse.ok) throw new Error('找不到 products.json');
            
            const productsData = await productsResponse.json();
            setProducts(productsData);
            try {
              localStorage.setItem(CACHE_KEY_DATA, JSON.stringify(productsData));
              localStorage.setItem(CACHE_KEY_VERSION, latestVersion);
            } catch (e) {
              console.warn("⚠️ 快取容量已滿", e);
            }
          } catch (err) {
            console.warn("⚠️ 載入內建範例資料", err);
            setProducts(MOCK_PRODUCTS);
          } finally {
            setLoading(false);
          }
        };
        fetchProductData();
      }, [user]);

      const handleGoogleLogin = async () => {
        if (isMockMode) {
          setAppUnlocked(true);
          setUserRole('ADMIN');
          return;
        }
        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("登入失敗", error);
          alert("登入失敗: " + error.message);
        }
      };

      const handleLogout = async () => {
        if (!isMockMode && auth) {
          try { await signOut(auth); } catch (e) { console.error("登出失敗", e); }
        }
        setAppUnlocked(false);
        setUserRole('GUEST');
      };

      if (!appUnlocked) {
        return (
          <div className="min-h-screen bg-surface flex items-center justify-center p-4">
            <div className="bg-surface-container-lowest p-8 rounded-2xl shadow-lg max-w-md w-full border border-outline-variant/20 relative overflow-hidden">
              {isMockMode && (
                <div className="absolute top-0 left-0 right-0 bg-error-container text-on-error-container text-xs text-center py-1 font-bold">
                  目前為離線/本機模擬模式 (Mock Mode)
                </div>
              )}
              <div className="flex justify-center mb-6 mt-4">
                <div className="h-16 w-16 bg-primary-container text-on-primary rounded-full flex items-center justify-center">
                  <span className="material-symbols-outlined text-3xl">request_quote</span>
                </div>
              </div>
              <h1 className="text-2xl font-bold text-center mb-2 font-headline text-on-surface">Architect's Ledger</h1>
              <p className="text-center text-secondary mb-8 text-sm font-label">Enterprise Portal Login</p>
              
              <button 
                onClick={handleGoogleLogin}
                className="w-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface font-semibold py-3 px-4 rounded-xl hover:bg-surface-container-low transition-colors flex items-center justify-center gap-3 shadow-sm"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Sign in with Google
              </button>
            </div>
          </div>
        );
      }

      return <QuotationEngine products={products} loading={loading} userRole={userRole} onLogout={handleLogout} fb={fb} db={db} user={user} isMockMode={isMockMode} />;
    }

    function QuotationEngine({ products, loading, userRole, onLogout, fb, db, user, isMockMode }) {
      const [currency, setCurrency] = useState('HKD');
      const [strategy, setStrategy] = useState('Deal Reg, Registered Partner');
      const exchangeRate = currency === 'HKD' ? 7.85 : 1;
      
      const [cart, setCart] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearching, setIsSearching] = useState(false);
      const [isPreview, setIsPreview] = useState(false);
      const [resellerName, setResellerName] = useState('');
      const [endUserName, setEndUserName] = useState('');
      const [isUnofficial, setIsUnofficial] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      
      const [filterProductType, setFilterProductType] = useState(['Production']);
      const [filterProductClass, setFilterProductClass] = useState(['Product', 'Subscription', 'Support']);
      const [filterIsHA, setFilterIsHA] = useState(false);

      const [isNoIncentive, setIsNoIncentive] = useState(false);
      const [discountType, setDiscountType] = useState('%');
      const [discountInput, setDiscountInput] = useState('');
      const [appliedOverallDiscount, setAppliedOverallDiscount] = useState({ type: '%', value: 0 });

      const [bulkQty, setBulkQty] = useState(1);
      const [bulkMargin, setBulkMargin] = useState(10);

      const searchContainerRef = useRef(null);

      useEffect(() => {
        setCart(prev => prev.map(item => ({ ...item, manualDiscount: null, manualMargin: null, manualListPrice: null })));
      }, [strategy]);

      const handleCurrencyChange = (e) => {
        const newCurrency = e.target.value;
        if (newCurrency === currency) return;

        setCart(prev => prev.map(item => {
          if (item.manualListPrice !== null) {
            let convertedPrice = item.manualListPrice;
            if (currency === 'USD' && newCurrency === 'HKD') {
              convertedPrice = item.manualListPrice * 7.85;
            } else if (currency === 'HKD' && newCurrency === 'USD') {
              convertedPrice = item.manualListPrice / 7.85;
            }
            return { ...item, manualListPrice: convertedPrice };
          }
          return item;
        }));
        setCurrency(newCurrency);
      };

      const productTypeOptions = useMemo(() => {
        const types = new Set(products.map(p => p.Product_type).filter(Boolean));
        if (!types.has('Production')) types.add('Production');
        return Array.from(types);
      }, [products]);

      const productClassOptions = useMemo(() => {
        const classes = new Set(products.map(p => p.Product_class).filter(Boolean));
        ['Product', 'Subscription', 'Support'].forEach(c => classes.add(c));
        return Array.from(classes);
      }, [products]);

      const toggleFilter = (setState, val) => {
        setState(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
      };

      const searchResults = useMemo(() => {
        if (!searchQuery.trim()) return [];
        
        const preFiltered = products.filter(p => {
          const isRenewProduct = p.Is_Renew === true || String(p.Is_Renew).toUpperCase() === 'TRUE';
          if (isRenewProduct) return false;

          const isHAProduct = p.Is_HA === true || String(p.Is_HA).toUpperCase() === 'TRUE';
          if (filterIsHA && !isHAProduct) return false;
          if (!filterIsHA && isHAProduct) return false;

          const matchType = filterProductType.length === 0 || filterProductType.includes(p.Product_type);
          const matchClass = filterProductClass.length === 0 || filterProductClass.includes(p.Product_class);
          
          return matchType && matchClass;
        });

        const terms = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
        
        return preFiltered.filter(p => {
          const docId = (p.id || p.SKU || '').toLowerCase();
          const desc = (p.Description || '').toLowerCase();
          return terms.some(term => docId.includes(term) || desc.includes(term));
        }).slice(0, 20);
      }, [searchQuery, products, filterProductType, filterProductClass, filterIsHA]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (searchContainerRef.current && !searchContainerRef.current.contains(event.target)) {
            setIsSearching(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const addToCart = (product) => {
        const newItemId = `${product.SKU}_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
        let initialTerm = product.Term_months !== undefined ? Number(product.Term_months) : 12;
        const skuUpper = product.SKU.toUpperCase();

        if (initialTerm > 60) initialTerm = 60;
        if (skuUpper.includes('-3YR') && initialTerm < 36) initialTerm = 36;
        if (skuUpper.includes('-5YR') && initialTerm < 60) initialTerm = 60;

        setCart(prev => [...prev, {
          id: newItemId, product, qty: 1, termMonths: initialTerm, manualDiscount: null, manualMargin: null, manualListPrice: null
        }]);
        setSearchQuery('');
        setIsSearching(false);
      };

      const removeRow = (id) => setCart(prev => prev.filter(item => item.id !== id));
      
      const duplicateRow = (id) => {
        setCart(prev => {
          const index = prev.findIndex(item => item.id === id);
          if (index === -1) return prev;
          const itemToCopy = prev[index];
          const newItem = {
            ...itemToCopy,
            id: `${itemToCopy.product.SKU}_${Date.now()}_${Math.floor(Math.random() * 1000)}`
          };
          const newCart = [...prev];
          newCart.splice(index + 1, 0, newItem);
          return newCart;
        });
      };

      const updateRow = (id, field, value) => {
        setCart(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
      };

      const handleTermBlur = (id, sku, val) => {
        let term = parseInt(val, 10);
        if (isNaN(term)) term = 12;
        
        const skuUpper = sku.toUpperCase();
        if (term > 60) term = 60;
        if (skuUpper.includes('-3YR') && term < 36) term = 36;
        if (skuUpper.includes('-5YR') && term < 60) term = 60;

        updateRow(id, 'termMonths', term);
      };

      const handleApplyOverallDiscount = () => {
        const val = parseFloat(discountInput);
        if (!isNaN(val) && val >= 0) {
          setAppliedOverallDiscount({ type: discountType, value: val });
        } else {
          setAppliedOverallDiscount({ type: '%', value: 0 });
        }
      };

      const handleResetOverallDiscount = () => {
        setDiscountType('%');
        setDiscountInput('');
        setAppliedOverallDiscount({ type: '%', value: 0 });
      };

      const handleBulkUpdateQty = () => {
        const newQty = parseInt(bulkQty, 10);
        if (!isNaN(newQty) && newQty > 0) {
          setCart(prev => prev.map(item => ({ ...item, qty: newQty })));
          setToastMessage('已統一更新數量！');
          setTimeout(() => setToastMessage(''), 3000);
        }
      };

      const handleBulkUpdateMargin = () => {
        const newMargin = parseFloat(bulkMargin);
        if (!isNaN(newMargin) && newMargin >= 0) {
          setCart(prev => prev.map(item => ({ ...item, manualMargin: newMargin / 100 })));
          setToastMessage('已統一更新 Margin！');
          setTimeout(() => setToastMessage(''), 3000);
        }
      };

      const handleToggleUnofficial = () => {
        if (!isUnofficial) {
          setResellerName('');
          setEndUserName('');
        }
        setIsUnofficial(!isUnofficial);
      };

      const getCalculatedRow = (item) => {
        const { product, qty, termMonths, manualDiscount, manualMargin, manualListPrice } = item;
        
        let listPriceUSD = Number(product.Unit_list_price);
        if (isNaN(listPriceUSD)) listPriceUSD = 0;

        const defaultListPrice = listPriceUSD * exchangeRate;
        const listPrice = manualListPrice !== null ? manualListPrice : defaultListPrice;
        
        const defaultDiscount = product[STRATEGIES[strategy]] || 0;
        const appliedDiscount = manualDiscount !== null ? manualDiscount : defaultDiscount;
        
        let termMultiplier = 1;
        if (termMonths !== 0) {
          const skuUpper = product.SKU.toUpperCase();
          if (skuUpper.includes('-3YR')) {
            termMultiplier = termMonths / 36;
          } else if (skuUpper.includes('-5YR')) {
            termMultiplier = termMonths / 60;
          } else {
            termMultiplier = termMonths / 12;
          }
        }

        const distyCost = listPrice * (1 - appliedDiscount) * qty * termMultiplier; 
        
        const defaultMargin = strategy === 'VELOCI Program' ? (product.Disty_margin_Veloci || 0.1) : (product.Disty_margin || 0.15);
        const appliedMargin = manualMargin !== null ? manualMargin : defaultMargin;
        
        const incentiveUSD = isNoIncentive ? 0 : ((product.Incentive_coupon || 0) + (product.Incentive_gift || 0));
        const incentivePool = incentiveUSD * exchangeRate;
        
        let extendedPriceRaw = 0;
        if (appliedMargin < 1) {
          extendedPriceRaw = (distyCost / (1 - appliedMargin)) + incentivePool;
        }

        let extendedPrice = currency === 'HKD' ? Math.round(extendedPriceRaw / 10) * 10 : Math.round(extendedPriceRaw);
        return { listPrice, appliedDiscount, distyCost, appliedMargin, incentivePool, extendedPrice };
      };

      const groupedCart = useMemo(() => {
        const CLASS_ORDER = ["Product", "Support", "Subscription", "HW Accessory", "Miscellaneous"];
        
        const groups = {
          "Product": [],
          "Support": [],
          "Subscription": [],
          "HW Accessory": [],
          "Miscellaneous": [],
          "Other": []
        };

        cart.forEach(item => {
          const pClass = item.product.Product_class;
          if (groups[pClass]) {
            groups[pClass].push(item);
          } else {
            groups["Other"].push(item);
          }
        });

        const sortedItems = [];
        
        ["Product", "Support", "Subscription", "HW Accessory", "Miscellaneous", "Other"].forEach(c => {
          if (groups[c] && groups[c].length > 0) {
            sortedItems.push({ type: 'header', title: c, id: `header-${c}` });
            sortedItems.push(...groups[c].map(item => ({ type: 'item', ...item })));
          }
        });
        
        return sortedItems;
      }, [cart]);

      const subTotalAmount = cart.reduce((sum, item) => sum + getCalculatedRow(item).extendedPrice, 0);
      
      let overallDiscountAmount = 0;
      if (appliedOverallDiscount.value > 0) {
        if (appliedOverallDiscount.type === '$') {
          overallDiscountAmount = appliedOverallDiscount.value; 
        } else {
          overallDiscountAmount = subTotalAmount * (appliedOverallDiscount.value / 100);
        }
      }
      
      const totalAmount = Math.max(0, subTotalAmount - overallDiscountAmount);
      const totalBookingToVendor = cart.reduce((sum, item) => sum + getCalculatedRow(item).distyCost, 0);
      const totalOtherCost = cart.reduce((sum, item) => sum + getCalculatedRow(item).incentivePool, 0);
      const totalGrossMarginAmount = totalAmount - totalBookingToVendor - totalOtherCost;
      const totalGrossMarginPercent = totalAmount > 0 ? (totalGrossMarginAmount / totalAmount) * 100 : 0;

      const saveQuotation = async () => {
        if (cart.length === 0) return;
        const timestamp = Date.now();
        const quotationData = {
          QuoteID: `QT-${timestamp}`,
          Date: new Date(timestamp).toISOString(),
          CreatedAt: new Date(timestamp).toISOString(),
          Currency: currency, AppliedStrategy: strategy,
          IsNoIncentive: isNoIncentive, OverallDiscount: appliedOverallDiscount,
          SubTotal: subTotalAmount, TotalAmount: totalAmount,
          ResellerName: resellerName || 'Unknown',
          EndUserName: endUserName || 'Unknown',
          IsUnofficial: isUnofficial,
          Items: groupedCart.filter(row => row.type === 'item').map(item => {
            const calc = getCalculatedRow(item);
            return {
              ProductClass: item.product.Product_class, 
              SKU: item.product.SKU, Description: item.product.Description, Qty: item.qty, Term: item.termMonths,
              ListPrice: calc.listPrice, Discount: calc.appliedDiscount, DistyCost: calc.distyCost,
              Margin: calc.appliedMargin, ExtendedPrice: calc.extendedPrice
            };
          })
        };

        if (isMockMode || !db || !user) {
          console.log("=== 準備寫入 (模擬模式) ===", JSON.stringify(quotationData, null, 2));
          setToastMessage('報價單已成功生成！');
          setTimeout(() => setToastMessage(''), 3000);
          return;
        }

        try {
          const { collection, addDoc } = fb;
          const quotationsRef = collection(db, 'quote_history');
          await addDoc(quotationsRef, quotationData);
        } catch (error) {
          console.error("儲存失敗:", error);
          alert("儲存報價單失敗：" + error.message);
        }
      };

      const handleGenerateQuote = async () => {
        await saveQuotation();
        setIsPreview(true);
      };

      const formatMoney = (val, hideDecimals = false) => {
        return new Intl.NumberFormat('en-US', {
          style: 'currency', currency: currency, 
          minimumFractionDigits: hideDecimals ? 0 : 2, maximumFractionDigits: hideDecimals ? 0 : 2

      };

      const exportToExcel = async () => {
        if (isUnofficial) return; 
        try {

            alert("Excel 匯出模組尚未載入完成，請確認網路連線或重新整理網頁。");

          const ExcelJS = window.ExcelJS;
          const workbook = new ExcelJS.Workbook();
          const worksheet = workbook.addWorksheet('Quotation');

          worksheet.columns = [

            { header: '', key: 'desc', width: 50 },
            { header: '', key: 'qty', width: 10 },

            { header: '', key: 'extPrice', width: 25 }

          const titleRow = worksheet.addRow(['OFFICIAL QUOTATION']);
          titleRow.font = { size: 16, bold: true };
          worksheet.addRow(['Date:', new Date().toLocaleDateString()]);
          worksheet.addRow(['Reseller Name:', resellerName || '____________________']);
          worksheet.addRow(['End User Name:', endUserName || '____________________']);
          worksheet.addRow(['Currency:', currency]);
          worksheet.addRow([]); 

          const headerLabels = ['SKU / Item', 'Description', 'Qty', 'Term (MONTHS)', `Unit Price (${currency})`, `Reseller Extended Price (${currency})`];
          const headerRow = worksheet.addRow(headerLabels);
          headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } }; 
          headerRow.eachCell(cell => {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF005596' } }; // Brand Primary
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
          });

          groupedCart.forEach(row => {
            if (row.type === 'header') {
              const groupRow = worksheet.addRow([row.title]);
              groupRow.font = { bold: true, color: { argb: 'FF333333' } };
              groupRow.eachCell(cell => {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } }; 
                cell.alignment = { vertical: 'middle' };
              });
              worksheet.mergeCells(`A${groupRow.number}:F${groupRow.number}`);
            } else {
              const calc = getCalculatedRow(row);
              const unitPrice = row.qty > 0 ? calc.extendedPrice / row.qty : 0;
              const dataRow = worksheet.addRow([
                row.product.SKU,
                row.product.Description,
                row.qty,
                row.termMonths,
                unitPrice,
                calc.extendedPrice
              ]);

              dataRow.getCell(5).numFmt = '#,##0.00';
              dataRow.getCell(6).numFmt = '#,##0'; 
              dataRow.getCell(3).alignment = { horizontal: 'center' };
              dataRow.getCell(4).alignment = { horizontal: 'center' };
            }
          });

          worksheet.addRow([]);
          if (appliedOverallDiscount.value > 0) {
            const subRow = worksheet.addRow(['', '', '', '', 'Subtotal:', subTotalAmount]);
            subRow.getCell(6).numFmt = '#,##0.00';
            const discRow = worksheet.addRow(['', '', '', '', `Discount (${appliedOverallDiscount.type === '%' ? appliedOverallDiscount.value + '%' : currency}):`, -overallDiscountAmount]);
            discRow.getCell(6).numFmt = '#,##0.00';
            discRow.font = { color: { argb: 'FFE01F26' } }; // Brand Red
          }
          
          const totalRow = worksheet.addRow(['', '', '', '', 'Total:', totalAmount]);
          totalRow.font = { bold: true, size: 12 };
          totalRow.getCell(6).numFmt = '#,##0.00';

          const buffer = await workbook.xlsx.writeBuffer();
          const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          window.saveAs(blob, `Quotation_${endUserName || 'Draft'}_${Date.now()}.xlsx`);
          
          setToastMessage('已成功匯出具有格式的 Excel！');
          setTimeout(() => setToastMessage(''), 3000);
        } catch (error) {
          console.error("Excel Export Error:", error);
          alert("匯出 Excel 時發生錯誤: " + (error.message || error));
        }
      };

      // ----------------------------------------------------

                      <span className="material-symbols-outlined text-[18px]">print</span> 列印 PDF
                    </button>
                  </div>
                  <button onClick={() => setIsPreview(false)} className="mt-3 no-print text-secondary hover:text-on-surface text-sm flex items-center gap-1 justify-end w-full font-label transition-colors">
                    <span className="material-symbols-outlined text-[16px]">close</span> 退出預覽
                  </button>
                </div>
              </div>
              
              <table className="w-full border-collapse mb-8 text-sm font-body">
                <thead>
                  <tr className="bg-surface-container-low border-b border-outline-variant/30">
                    <th className="py-3 px-4 text-left font-bold text-primary font-label uppercase tracking-wider text-xs">SKU / Item</th>
                    <th className="py-3 px-4 text-left font-bold text-primary font-label uppercase tracking-wider text-xs">Description</th>
                    <th className="py-3 px-4 text-center font-bold text-primary font-label uppercase tracking-wider text-xs">Qty</th>
                    <th className="py-3 px-4 text-center font-bold text-primary font-label uppercase tracking-wider text-xs">Term (M)</th>
                    <th className="py-3 px-4 text-right font-bold text-primary font-label uppercase tracking-wider text-xs">Unit Price</th>
                    <th className="py-3 px-4 text-right font-bold text-primary font-label uppercase tracking-wider text-xs">Ext. Price</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-outline-variant/10">
                  {cart.length === 0 ? (
                    <tr>
                      <td colSpan="6" className="py-8 text-center text-secondary italic">Empty Quotation</td>
                    </tr>
                  ) : (
                    groupedCart.map((row, idx) => {
                      if (row.type === 'header') {
                        return (
                          <tr key={row.id} className="bg-surface-variant/30">
                            <td colSpan="6" className="py-2 px-4 text-xs font-bold text-on-surface uppercase tracking-widest font-label">
                              {row.title}
                            </td>
                          </tr>
                        );
                      }

                      const item = row;
                      const calc = getCalculatedRow(item);
                      const unitPrice = item.qty > 0 ? calc.extendedPrice / item.qty : 0; 
                      return (
                        <tr key={item.id} className="hover:bg-surface-container-lowest transition-colors">
                          <td className="py-3 px-4 font-semibold text-on-surface">{item.product.SKU}</td>
                          <td className="py-3 px-4 text-secondary pr-4 leading-relaxed">{item.product.Description}</td>
                          <td className="py-3 px-4 text-center font-medium">{item.qty}</td>
                          <td className="py-3 px-4 text-center text-secondary">{item.termMonths}</td>
                          <td className="py-3 px-4 text-right font-mono text-secondary">{formatMoney(unitPrice, true)}</td>
                          <td className="py-3 px-4 text-right font-bold text-on-surface font-mono">{formatMoney(calc.extendedPrice, true)}</td>
                        </tr>
                      )
                    })
                  )}
                </tbody>
              </table>
              <div className="flex justify-end">
                <div className="w-80 border-t border-outline-variant/50 pt-4 flex flex-col gap-3">
                  {appliedOverallDiscount.value > 0 && (
                    <>
                      <div className="flex justify-between items-center text-secondary text-sm">
                        <span className="font-label">Subtotal:</span>
                        <span className="font-mono">{formatMoney(subTotalAmount, true)}</span>
                      </div>
                      <div className="flex justify-between items-center text-brand-red text-sm">
                        <span className="font-label">Discount ({appliedOverallDiscount.type === '%' ? `${appliedOverallDiscount.value}%` : currency}):</span>

                  <div className="flex justify-between items-center text-xl font-black text-primary font-headline">

        <div className="min-h-screen bg-surface flex font-body">

          {/* Sidebar (Placeholder Navigation) */}

                <span className="material-symbols-outlined">account_tree</span>

              </a>
              <a href="#" onClick={(e) => e.preventDefault()} className="flex items-center gap-3 px-3 py-2.5 text-secondary hover:text-primary hover:bg-surface-container-low transition-colors duration-200 rounded-lg">

                    <select value={currency} onChange={handleCurrencyChange} className="bg-transparent font-bold text-sm text-primary focus:ring-0 border-0 py-1 pl-1 pr-6 cursor-pointer cursor-pointer">

                </div>
                <div className="flex gap-3">
                  <button onClick={handleGenerateQuote} disabled={cart.length === 0} className="px-6 py-2.5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg hover:shadow-primary/20 transition-all text-sm flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95">
                    <span className="material-symbols-outlined text-[18px]">receipt_long</span> Generate Quote
                  </button>
                </div>
              </div>

              {/* Bento Grid */}
              <div className="grid grid-cols-12 gap-8 items-start">
                
                {/* Left Canvas: Search & Table (col-span-8 or 9) */}
                <div className="col-span-12 xl:col-span-8 space-y-6">
                  
                  {/* Search & Filters Bento Box */}
                  <div className="bg-surface-container-lowest rounded-2xl p-6 shadow-sm ring-1 ring-outline-variant/20 relative z-20" ref={searchContainerRef}>
                    <div className="flex flex-col gap-4">
                      {/* Search Bar */}
                      <div className="relative">
                        <span className="absolute inset-y-0 left-4 flex items-center text-secondary">
                          <span className="material-symbols-outlined">search</span>
                        </span>
                        <input 
                          type="text" 
                          value={searchQuery} 
                          onChange={(e) => { setSearchQuery(e.target.value); setIsSearching(true); }} 
                          onFocus={() => setIsSearching(true)} 
                          disabled={loading} 
                          placeholder={loading ? "Loading product catalog..." : "Search by SKU, Product Name or type space for OR query (e.g. PA-440 sub)"} 
                          className="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant/30 rounded-xl text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all disabled:opacity-50 font-medium" 
                        />
                      </div>
                      
                      {/* Interactive Filters */}
                      <div className="flex flex-wrap items-center gap-x-6 gap-y-3 bg-surface-container-low p-3 rounded-xl border border-outline-variant/20">
                        <div className="flex items-center gap-3">
                          <span className="text-[10px] font-bold text-secondary uppercase tracking-widest flex items-center gap-1">
                            <span className="material-symbols-outlined text-[14px]">category</span> Type
                          </span>
                          <div className="flex gap-1">
                            {productTypeOptions.map(opt => (
                              <button key={opt} onClick={() => toggleFilter(setFilterProductType, opt)}
                                className={`px-2.5 py-1 text-[11px] font-bold rounded-lg transition-colors ${filterProductType.includes(opt) ? 'bg-primary text-on-primary shadow-sm' : 'bg-surface-container-lowest text-secondary border border-outline-variant/30 hover:bg-surface-container-highest'}`}
                              >{opt}</button>
                            ))}
                          </div>
                        </div>
                        <div className="w-px h-5 bg-outline-variant/40 hidden md:block"></div>
                        <div className="flex items-center gap-3">
                          <span className="text-[10px] font-bold text-secondary uppercase tracking-widest flex items-center gap-1">
                            <span className="material-symbols-outlined text-[14px]">class</span> Class
                          </span>
                          <div className="flex gap-1 flex-wrap">
                            {productClassOptions.map(opt => (
                              <button key={opt} onClick={() => toggleFilter(setFilterProductClass, opt)}
                                className={`px-2.5 py-1 text-[11px] font-bold rounded-lg transition-colors ${filterProductClass.includes(opt) ? 'bg-primary text-on-primary shadow-sm' : 'bg-surface-container-lowest text-secondary border border-outline-variant/30 hover:bg-surface-container-highest'}`}
                              >{opt}</button>
                            ))}
                          </div>
                        </div>
                        <div className="w-px h-5 bg-outline-variant/40 hidden lg:block"></div>
                        <div className="flex items-center gap-3">
                          <span className="text-[10px] font-bold text-secondary uppercase tracking-widest flex items-center gap-1">
                            <span className="material-symbols-outlined text-[14px]">extension</span> HA SUB
                          </span>
                          <button onClick={() => setFilterIsHA(!filterIsHA)} 
                            className={`px-3 py-1 text-[11px] font-bold rounded-lg transition-colors ${filterIsHA ? 'bg-primary text-on-primary shadow-sm' : 'bg-surface-container-lowest text-secondary border border-outline-variant/30 hover:bg-surface-container-highest'}`}
                          >Yes</button>
                        </div>
                      </div>
                    </div>

                    {/* Typeahead Results */}
                    {isSearching && searchQuery.trim() !== '' && (
                      <div className="absolute left-6 right-6 mt-2 bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-2xl max-h-[400px] overflow-y-auto z-50 divide-y divide-outline-variant/10">
                        {searchResults.length === 0 ? (
                          <div className="p-6 text-sm text-secondary text-center flex flex-col items-center">
                            <span className="material-symbols-outlined text-4xl text-outline-variant mb-2">search_off</span>
                            No matching products found in current filters.
                          </div>
                        ) : (
                          searchResults.map(prod => (
                            <div key={prod.SKU} onClick={() => addToCart(prod)} className="p-4 hover:bg-surface-container-low cursor-pointer flex justify-between items-center group transition-colors">
                              <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center">
                                  <span className="material-symbols-outlined text-primary/70">inventory_2</span>
                                </div>
                                <div>
                                  <div className="font-bold text-sm text-on-surface mb-0.5">{prod.SKU}</div>
                                  <div className="text-xs text-secondary truncate max-w-md">{prod.Description}</div>
                                </div>
                              </div>
                              <div className="flex items-center gap-4">
                                <span className="text-[10px] font-bold uppercase tracking-wider bg-surface-variant text-on-surface-variant px-2.5 py-1 rounded-full">{prod.Product_type}</span>
                                <button className="w-8 h-8 rounded-full bg-primary-fixed text-primary flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all scale-90 group-hover:scale-100">
                                  <span className="material-symbols-outlined text-[18px]">add</span>
                                </button>
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    )}
                  </div>

                  {/* Line Items Table Box */}
                  <div className="bg-surface-container-lowest rounded-2xl shadow-sm ring-1 ring-outline-variant/20 overflow-hidden relative z-10">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left whitespace-nowrap">
                        <thead>
                          <tr className="bg-surface-container-low border-b border-outline-variant/20">
                            <th className="px-4 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label w-56">Product Details</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-right">Unit Price ({currency})</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-center">Disc (%)</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-right">Disty Cost</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-center">Qty</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-center">Term</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-center">Margin</th>
                            <th className="px-3 py-3 text-[10px] font-extrabold text-secondary uppercase tracking-widest font-label text-right">Incentive</th>
                            <th className="px-4 py-3 text-[10px] font-extrabold text-primary uppercase tracking-widest font-label text-right bg-primary-fixed/30">Ext. Price</th>
                            <th className="px-2 py-3 w-16"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-outline-variant/10">
                          {cart.length === 0 ? (
                            <tr>
                              <td colSpan="10" className="px-6 py-20 text-center text-secondary">
                                <div className="flex flex-col items-center justify-center">
                                  <span className="material-symbols-outlined text-5xl mb-3 text-outline-variant/50">post_add</span>
                                  <p className="font-medium text-sm">Cart is empty. Search above to add items.</p>
                                </div>
                              </td>
                            </tr>
                          ) : (
                            groupedCart.map((row, idx) => {
                              // 分類標題列
                              if (row.type === 'header') {
                                return (
                                  <tr key={row.id} className="bg-surface-variant/40">
                                    <td colSpan="10" className="px-5 py-2.5 text-xs font-black text-on-surface uppercase tracking-[0.15em] font-headline border-y border-outline-variant/10">
                                      {row.title}
                                    </td>
                                  </tr>
                                );
                              }

                              // 產品項目列
                              const item = row;
                              const calc = getCalculatedRow(item);
                              const isEditableListPrice = isNaN(Number(item.product.Unit_list_price));
                              const isTermZero = Number(item.product.Term_months || 0) === 0;

                              return (
                                <tr key={item.id} className="hover:bg-surface-container-highest/20 transition-colors group">
                                  <td className="px-4 py-4">
                                    <div className="font-bold text-on-surface text-[13px] leading-tight mb-0.5">{item.product.SKU}</div>
                                    <div className="text-[11px] text-secondary max-w-[200px] truncate mb-1.5" title={item.product.Description}>{item.product.Description}</div>
                                    <div className="text-[9px] font-bold uppercase tracking-wider bg-surface-container text-secondary inline-block px-1.5 py-0.5 rounded">{item.product.Product_type}</div>
                                  </td>
                                  
                                  {/* Unit Price */}
                                  <td className="px-3 py-4 text-right">
                                    <div className="flex items-center justify-end gap-1">
                                      <span className="text-secondary font-bold text-xs">{currency === 'USD' ? '$' : 'HK$'}</span>
                                      <input type="number" step="0.01" min="0" disabled={!isEditableListPrice}
                                        className={`w-[76px] border border-outline-variant/30 rounded-lg p-1 text-[12px] text-right font-mono focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${!isEditableListPrice ? 'bg-surface-dim text-secondary cursor-not-allowed' : 'bg-surface-container-lowest font-bold'}`}
                                        value={item.manualListPrice !== null ? item.manualListPrice : calc.listPrice}
                                        onChange={(e) => updateRow(item.id, 'manualListPrice', e.target.value === '' ? null : parseFloat(e.target.value))}
                                      />
                                    </div>
                                  </td>

                                  {/* Discount */}
                                  <td className="px-3 py-4 text-center">
                                    <div className="flex items-center justify-center gap-1">
                                      <input type="number" step="0.1" min="0" max="100"
                                        className="w-[52px] bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 text-[12px] font-bold text-center font-mono focus:border-primary focus:ring-1 focus:ring-primary outline-none"
                                        value={Number(((item.manualDiscount !== null ? item.manualDiscount : calc.appliedDiscount) * 100).toFixed(2))}
                                        onChange={(e) => updateRow(item.id, 'manualDiscount', e.target.value === '' ? null : parseFloat(e.target.value) / 100)}
                                      />
                                    </div>
                                  </td>

                                  {/* Disty Cost */}
                                  <td className="px-3 py-4 text-right text-secondary font-mono text-[12px]">{formatMoney(calc.distyCost)}</td>
                                  
                                  {/* QTY */}
                                  <td className="px-3 py-4 text-center">
                                    <input type="number" min="1" 
                                      className="w-[48px] bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 text-[12px] font-bold text-center font-mono focus:border-primary focus:ring-1 focus:ring-primary outline-none"
                                      value={item.qty} onChange={(e) => updateRow(item.id, 'qty', parseInt(e.target.value) || 1)} />
                                  </td>
                                  
                                  {/* Term */}
                                  <td className="px-3 py-4 text-center">
                                    <input type="number" min="0" max="60" disabled={isTermZero}
                                      className={`w-[44px] border border-outline-variant/30 rounded-lg p-1 text-[12px] font-bold text-center font-mono focus:border-primary focus:ring-1 focus:ring-primary outline-none ${isTermZero ? 'bg-surface-dim text-secondary cursor-not-allowed' : 'bg-surface-container-lowest'}`}
                                      value={item.termMonths === '' ? '' : item.termMonths} 
                                      onChange={(e) => updateRow(item.id, 'termMonths', e.target.value)} 
                                      onBlur={(e) => handleTermBlur(item.id, item.product.SKU, e.target.value)}
                                    />
                                  </td>

                                  {/* Margin */}
                                  <td className="px-3 py-4 text-center">
                                    <div className="flex items-center justify-center gap-1">
                                      <input type="number" step="0.1" min="0" max="100"
                                        className="w-[52px] bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 text-[12px] font-bold text-center font-mono focus:border-primary focus:ring-1 focus:ring-primary outline-none"
                                        value={Number(((item.manualMargin !== null ? item.manualMargin : calc.appliedMargin) * 100).toFixed(2))}
                                        onChange={(e) => updateRow(item.id, 'manualMargin', e.target.value === '' ? null : parseFloat(e.target.value) / 100)}
                                      />
                                    </div>
                                  </td>

                                  {/* Incentive */}
                                  <td className="px-3 py-4 text-right text-secondary font-mono text-[12px]">{calc.incentivePool > 0 ? formatMoney(calc.incentivePool) : '-'}</td>
                                  
                                  {/* Ext Price */}
                                  <td className="px-4 py-4 text-right font-black text-primary bg-primary-fixed/10 font-mono text-[13px]">{formatMoney(calc.extendedPrice, true)}</td>
                                  
                                  {/* Actions */}
                                  <td className="px-2 py-4 text-center align-middle">
                                    <div className="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                      <button onClick={() => duplicateRow(item.id)} className="w-7 h-7 rounded bg-surface text-secondary hover:text-primary hover:bg-surface-container-high transition-colors flex items-center justify-center" title="Duplicate">
                                        <span className="material-symbols-outlined text-[16px]">content_copy</span>
                                      </button>
                                      <button onClick={() => removeRow(item.id)} className="w-7 h-7 rounded bg-surface text-secondary hover:text-brand-red hover:bg-error-container transition-colors flex items-center justify-center" title="Delete">
                                        <span className="material-symbols-outlined text-[16px]">delete</span>
                                      </button>
                                    </div>
                                  </td>
                                </tr>
                              );
                            })
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                {/* Right Canvas: Summary & Settings (col-span-4) */}
                <div className="col-span-12 xl:col-span-4 space-y-6">
                  
                  {/* Blue Summary Card */}
                  <div className="bg-primary rounded-3xl p-8 text-on-primary shadow-xl relative overflow-hidden">
                    <div className="absolute -right-16 -top-16 w-64 h-64 bg-white rounded-full blur-3xl opacity-10 pointer-events-none"></div>
                    <div className="relative z-10">
                      <p className="text-primary-fixed text-[10px] font-black uppercase tracking-widest font-label mb-3">Quote Summary</p>
                      <h2 className="text-4xl font-black font-headline mb-8 tracking-tighter">{formatMoney(totalAmount, true)}</h2>
                      
                      <div className="space-y-4 text-sm font-label">
                        <div className="flex justify-between border-b border-white/20 pb-3">
                          <span className="text-inverse-primary font-medium">Subtotal</span>
                          <span className="font-bold font-mono">{formatMoney(subTotalAmount, true)}</span>
                        </div>
                        {appliedOverallDiscount.value > 0 && (
                          <div className="flex justify-between border-b border-white/20 pb-3">
                            <span className="text-tertiary-fixed font-medium">Overall Discount</span>
                            <span className="font-bold font-mono text-tertiary-fixed">-{formatMoney(overallDiscountAmount, true)}</span>
                          </div>
                        )}
                        <div className="flex justify-between pt-2">
                          <span className="text-white font-black">Total Estimate</span>
                          <span className="text-white font-black text-lg font-mono tracking-tight">{formatMoney(totalAmount, true)}</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Client Details Form */}
                  <div className="bg-surface-container-lowest rounded-2xl p-6 shadow-sm ring-1 ring-outline-variant/20">
                    <div className="flex justify-between items-center mb-5">
                      <h3 className="font-headline font-bold text-primary flex items-center gap-2">
                        <span className="material-symbols-outlined text-[18px]">person</span> Document Info
                      </h3>
                      <button onClick={handleToggleUnofficial} className={`px-3 py-1.5 text-[10px] font-black uppercase tracking-wider rounded-lg transition-colors ${isUnofficial ? 'bg-primary text-on-primary shadow-md' : 'bg-surface-container-highest text-secondary hover:bg-outline-variant/30'}`}>
                        {isUnofficial ? 'Unofficial' : 'Official'}
                      </button>
                    </div>
                    
                    <div className="space-y-4">
                      <div>
                        <label className="block text-[11px] font-bold text-secondary mb-1.5 uppercase tracking-wide">Reseller Name</label>
                        <input type="text" placeholder="e.g. Ingram Micro" value={resellerName} onChange={(e) => setResellerName(e.target.value)} disabled={isUnofficial}
                          className={`w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed placeholder-transparent' : 'bg-surface-container-lowest'}`} 
                        />
                      </div>
                      <div>
                        <label className="block text-[11px] font-bold text-secondary mb-1.5 uppercase tracking-wide">End User Name</label>
                        <input type="text" placeholder="e.g. Metropolis Tower" value={endUserName} onChange={(e) => setEndUserName(e.target.value)} disabled={isUnofficial}
                          className={`w-full border border-outline-variant/30 rounded-xl p-2.5 text-sm font-medium focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors ${isUnofficial ? 'bg-surface-dim text-secondary cursor-not-allowed placeholder-transparent' : 'bg-surface-container-lowest'}`} 
                        />
                      </div>
                    </div>
                  </div>

                  {/* Global Pricing Controls */}
                  <div className="bg-surface-container-low rounded-2xl p-6 border border-outline-variant/20 shadow-sm">
                    <h3 className="font-headline font-bold text-primary flex items-center gap-2 mb-5">
                      <span className="material-symbols-outlined text-[18px]">tune</span> Pricing Controls
                    </h3>
                    
                    <div className="space-y-5">
                      {/* Booking/Margin Summary (Mini View) */}
                      <div className="bg-surface-container-highest p-3.5 rounded-xl space-y-2 border border-outline-variant/30">
                         <div className="flex justify-between items-center">
                          <span className="text-[10px] text-secondary font-bold uppercase tracking-wide">Booking to Vendor</span>
                          <span className="text-xs font-mono font-bold text-on-surface">{formatMoney(totalBookingToVendor, true)}</span>
                        </div>
                        <div className="flex justify-between items-center">
                          <span className="text-[10px] text-secondary font-bold uppercase tracking-wide">Other Cost</span>
                          <span className="text-xs font-mono font-bold text-on-surface">{formatMoney(totalOtherCost, true)}</span>
                        </div>
                        <div className="flex justify-between items-center border-t border-outline-variant/40 pt-2 mt-1">
                          <span className="text-[10px] text-primary font-black uppercase tracking-wide">Gross Margin</span>
                          <div className="flex items-center gap-2">
                            <span className="text-sm font-mono font-black text-primary">{formatMoney(totalGrossMarginAmount, true)}</span>
                            <span className="text-[9px] font-black text-brand-red bg-error-container px-1.5 py-0.5 rounded">
                              {totalGrossMarginPercent.toFixed(1)}%
                            </span>
                          </div>
                        </div>
                      </div>

                      {/* Controls */}
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                          <label className="text-[10px] font-bold text-secondary uppercase">Incentive</label>
                          <button onClick={() => setIsNoIncentive(!isNoIncentive)}
                            className={`w-full py-2 text-xs font-bold rounded-lg border transition-colors ${isNoIncentive ? 'bg-primary text-on-primary border-primary shadow-sm' : 'bg-surface-container-lowest text-secondary border-outline-variant/30 hover:bg-surface-container-highest'}`}
                          >Cancel Incentive</button>
                        </div>
                        
                        <div className="space-y-1.5">
                          <label className="text-[10px] font-bold text-secondary uppercase">Bulk Qty</label>
                          <div className="flex bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 focus-within:ring-1 focus-within:border-primary">
                            <input type="number" min="1" step="1" value={bulkQty} onChange={(e) => setBulkQty(e.target.value)} 
                              className="w-full bg-transparent border-0 text-xs text-center font-bold font-mono focus:ring-0 p-0" />
                            <button onClick={handleBulkUpdateQty} className="px-2 bg-surface-container-high rounded text-[10px] font-bold text-primary hover:bg-primary hover:text-on-primary transition-colors">SET</button>
                          </div>
                        </div>
                        
                        <div className="space-y-1.5">
                          <label className="text-[10px] font-bold text-secondary uppercase">Bulk Margin (%)</label>
                          <div className="flex bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-1 focus-within:ring-1 focus-within:border-primary">
                            <input type="number" min="0" step="1" value={bulkMargin} onChange={(e) => setBulkMargin(e.target.value)} 
                              className="w-full bg-transparent border-0 text-xs text-center font-bold font-mono focus:ring-0 p-0" />
                            <button onClick={handleBulkUpdateMargin} className="px-2 bg-surface-container-high rounded text-[10px] font-bold text-primary hover:bg-primary hover:text-on-primary transition-colors">SET</button>
                          </div>
                        </div>
                      </div>

                      <div className="pt-2 border-t border-outline-variant/20">
                        <label className="block text-[10px] font-bold text-secondary uppercase mb-2">Overall Discount</label>
                        <div className="flex items-center gap-2">
                          <div className="flex bg-surface-container-high rounded-lg p-0.5 shrink-0">
                            <button onClick={() => setDiscountType('$')} className={`px-2 py-1 text-xs font-bold rounded-md transition-colors ${discountType === '$' ? 'bg-white text-primary shadow-sm' : 'text-secondary hover:text-primary'}`}>$</button>
                            <button onClick={() => setDiscountType('%')} className={`px-2 py-1 text-xs font-bold rounded-md transition-colors ${discountType === '%' ? 'bg-white text-primary shadow-sm' : 'text-secondary hover:text-primary'}`}>%</button>
                          </div>
                          <input type="number" min="0" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="0" className="flex-1 min-w-0 bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-2 text-xs font-mono font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none" />
                          <button onClick={handleApplyOverallDiscount} className="px-2.5 py-1.5 text-[10px] font-black rounded-lg bg-primary text-on-primary hover:bg-primary-container transition-colors shadow-sm">SET</button>
                          <button onClick={handleResetOverallDiscount} className="px-2 py-1.5 text-[10px] font-black rounded-lg bg-surface-container-highest text-secondary hover:bg-brand-red hover:text-white transition-colors" title="Reset"><span className="material-symbols-outlined text-[14px]">refresh</span></button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    let isAppRendered = false;
    const mountReactApp = () => {
      if (isAppRendered) return;
      isAppRendered = true;
      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App fb={window.FirebaseLib} />);
    };

    window.addEventListener('firebase-loaded', mountReactApp);
    window.addEventListener('firebase-failed', mountReactApp);

    setTimeout(() => {
      if (!isAppRendered) {
        console.warn("模組載入逾時，強制以模擬模式啟動。");
        mountReactApp();
      }
    }, 2500);
  </script>
</body>
</html>
