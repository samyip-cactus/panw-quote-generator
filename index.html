<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B 報價生成系統</title>
  
  <!-- 載入 Tailwind CSS (移除 crossorigin 解決被阻擋的問題) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 全域錯誤攔截器 -->
  <script>
    window.onerror = function(msg, url, line, col, error) {
      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      document.body.innerHTML += '<div style="position:fixed; top:0; left:0; right:0; background:#fee2e2; border-bottom:1px solid #f87171; color:#b91c1c; padding:16px; z-index:9999; font-family:sans-serif; text-align:left;">' +
        '<h3 style="font-weight:bold; margin-bottom:4px;">系統發生錯誤，導致無法渲染畫面：</h3>' + msg + 
        '<br/><pre style="margin-top:8px; font-size:12px; color:#7f1d1d; overflow:auto;">' + (error && error.stack ? error.stack : '') + '</pre>' +
      '</div>';
    };
  </script>

  <!-- 載入 React (使用穩定的 cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  
  <!-- 載入 Babel Standalone 支援 JSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js" crossorigin="anonymous"></script>

  <!-- 載入 ExcelJS 與 FileSaver 支援帶有樣式的 Excel 模板匯出 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" crossorigin="anonymous"></script>

  <style>
    @media print {
      body { background: white; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      .print-container { max-width: 100%; box-shadow: none; padding: 0; }
    }
    /* 隱藏數字輸入框的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <!-- 初始載入動畫 -->
  <div id="loading" class="flex flex-col items-center justify-center min-h-screen text-slate-500">
    <svg class="animate-spin mb-3 h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <div class="font-semibold">系統初始化中...</div>
  </div>

  <div id="root"></div>

  <!-- Firebase 原生模組載入器 (恢復引入 Firestore 以支援寫入功能) -->
  <script type="module">
    Promise.all([
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js')
    ]).then(([app, auth, firestore]) => {
      window.FirebaseLib = { ...app, ...auth, ...firestore };
      window.dispatchEvent(new Event('firebase-loaded'));
    }).catch(e => {
      console.error("Firebase module import failed:", e);
      window.dispatchEvent(new Event('firebase-failed'));
    });
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const SVG_PATHS = {
      Search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
      Printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></>,
      Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
      LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
      Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
      Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
      X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
      Check: <><polyline points="20 6 9 17 4 12"/></>,
      Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
      FileText: <><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></>,
      ShieldAlert: <><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6 2a1 1 0 0 1 1 1v7z"/><path d="M12 8v4"/><path d="M12 16h.01"/></>
    };

    const Icon = ({ name, size = 20, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {SVG_PATHS[name]}
      </svg>
    );

    const STRATEGIES = {
      'Standard': 'Discount_Std',
      'Deal Reg, Registered Partner': 'Discount_DR_Registered',
      'Deal Reg, Innovator': 'Discount_DR_Innovator',
      'Deal Reg, Platinum': 'Discount_DR_Platinum',
      'Deal Reg, Diamond': 'Discount_DR_Diamond',
      'VELOCI Program': 'Discount_Veloci',
      'Renew, Incumbent': 'Discount_Renew_Incumbent',
      'Renew, Non-incumbent': 'Discount_Renew_base'
    };

    const MOCK_PRODUCTS = [
      {
        Product_class: "Product", Product_group: "Platforms", Model: "PA-3220", SKU: "PAN-PA-3220",
        Description: "Palo Alto Networks PA-3220", Product_type: "Production",
        Unit_list_price: 18000, Term_months: 12, Is_Renew: "FALSE", Is_HA: "FALSE",
        Discount_Std: 0.13, Discount_DR_Registered: 0.29, Discount_DR_Innovator: 0.37, Discount_DR_Platinum: 0.39, Discount_DR_Diamond: 0.41,
        Discount_Renew_Incumbent: 0.0, Discount_Renew_base: 0.0, Discount_Veloci: 0.29,
        Incentive_coupon: 50, Incentive_gift: 100, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-3220", "pa-3220", "palo alto", "hardware"]
      },
      {
        Product_class: "Product", Product_group: "Platforms", Model: "PA-440", SKU: "PAN-PA-440",
        Description: "Palo Alto Networks PA-440", Product_type: "Production",
        Unit_list_price: 2000, Term_months: 12, Is_Renew: "FALSE", Is_HA: "FALSE",
        Discount_Std: 0.10, Discount_DR_Registered: 0.25, Discount_DR_Innovator: 0.30, Discount_DR_Platinum: 0.35, Discount_DR_Diamond: 0.40,
        Discount_Renew_Incumbent: 0.0, Discount_Renew_base: 0.0, Discount_Veloci: 0.30,
        Incentive_coupon: 10, Incentive_gift: 20, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-440", "pa-440", "palo alto", "hardware"]
      },
      {
        Product_class: "Subscription", Product_group: "Threat Prevention", Model: "TP-3220", SKU: "PAN-PA-3220-TP-3YR",
        Description: "Threat Prevention Subscription 3 Year", Product_type: "Subscription",
        Unit_list_price: 10800, Term_months: 36, Is_Renew: "TRUE", Is_HA: "FALSE",
        Discount_Std: 0.13, Discount_DR_Registered: 0.29, Discount_DR_Innovator: 0.37, Discount_DR_Platinum: 0.39, Discount_DR_Diamond: 0.41,
        Discount_Renew_Incumbent: 0.15, Discount_Renew_base: 0.05, Discount_Veloci: 0.25,
        Incentive_coupon: 0, Incentive_gift: 0, Disty_margin: 0.15, Disty_margin_Veloci: 0.10,
        searchKeywords: ["pan-pa-3220-tp-3yr", "threat prevention", "subscription", "renew"]
      }
    ];

    function App({ fb }) {
      const [user, setUser] = useState(null);
      const [appUnlocked, setAppUnlocked] = useState(false);
      const [userRole, setUserRole] = useState('GUEST');
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);

      const firebaseConfig = {
        apiKey: "AIzaSyDCY2xS1KH742gaDUDyK18M7LnA8ML0FOs",
        authDomain: "panw-quote-generator.firebaseapp.com",
        projectId: "panw-quote-generator",
        storageBucket: "panw-quote-generator.firebasestorage.app",
        messagingSenderId: "916390333344",
        appId: "1:916390333344:web:dbc3ba95b46cf0f13832c5",
        measurementId: "G-0NR1BTLYCJ"
      };

      // 提取模組方法，加入 getFirestore, collection, addDoc
      const { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, getFirestore, collection, addDoc } = fb || {};

      // 嘗試初始化 Firebase (加入 db)
      const { auth, db, isMockMode } = useMemo(() => {
        if (!fb) return { isMockMode: true, auth: null, db: null };
        try {
          const app = initializeApp(firebaseConfig);
          return { auth: getAuth(app), db: getFirestore(app), isMockMode: false };
        } catch (err) {
          console.warn("Firebase 初始化失敗", err);
          return { isMockMode: true, auth: null, db: null };
        }
      }, [fb]);

      useEffect(() => {
        if (isMockMode || !auth) {
          setUser({ uid: 'mock-user' });
          return;
        }

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            setAppUnlocked(true);
            setUserRole('USER');
          } else {
            setUser(null);
            setAppUnlocked(false);
            setUserRole('GUEST');
          }
        });
        return () => unsubscribe();
      }, [auth, isMockMode]);

      // 【方案三】靜態 JSON 與版本號 Cache-Busting 載入邏輯 (0 Reads 架構)
      useEffect(() => {
        if (!user) return;
        
        const fetchProductData = async () => {
          setLoading(true);
          try {
            let latestVersion = 'fallback_version';
            try {
              const versionResponse = await fetch(`version.json?_t=${Date.now()}`);
              if (versionResponse.ok) {
                const versionData = await versionResponse.json();
                latestVersion = versionData.version || String(Date.now());
              } else {
                latestVersion = String(Date.now()); 
              }
            } catch (err) {
              latestVersion = String(Date.now());
            }

            const CACHE_KEY_DATA = 'quote_gen_products_data';
            const CACHE_KEY_VERSION = 'quote_gen_products_version';
            
            const cachedVersion = localStorage.getItem(CACHE_KEY_VERSION);
            const cachedData = localStorage.getItem(CACHE_KEY_DATA);

            if (cachedVersion === latestVersion && cachedData) {
              console.log(`✅ 版本一致 (${latestVersion})，直接從本地記憶體快速載入資料`);
              setProducts(JSON.parse(cachedData));
              setLoading(false);
              return;
            }

            console.log(`🔄 偵測到新版本 (${cachedVersion} -> ${latestVersion})，從伺服器下載最新 products.json...`);

            const productsResponse = await fetch(`products.json?v=${latestVersion}`);
            if (!productsResponse.ok) throw new Error('伺服器上找不到 products.json');
            
            const productsData = await productsResponse.json();

            setProducts(productsData);
            try {
              localStorage.setItem(CACHE_KEY_DATA, JSON.stringify(productsData));
              localStorage.setItem(CACHE_KEY_VERSION, latestVersion);
            } catch (e) {
              console.warn("⚠️ 瀏覽器快取容量已滿，本次資料將僅存放於記憶體中", e);
            }

          } catch (err) {
            console.warn("⚠️ 無法取得外部 JSON，自動載入內建範例資料供測試用：", err);
            setProducts(MOCK_PRODUCTS);
          } finally {
            setLoading(false);
          }
        };

        fetchProductData();
      }, [user]);

      const handleGoogleLogin = async () => {
        if (isMockMode) {
          setAppUnlocked(true);
          setUserRole('ADMIN');
          return;
        }
        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("登入失敗", error);
          alert("登入失敗: " + error.message);
        }
      };

      const handleLogout = async () => {
        if (!isMockMode && auth) {
          try { await signOut(auth); } catch (e) { console.error("登出失敗", e); }
        }
        setAppUnlocked(false);
        setUserRole('GUEST');
      };

      if (!appUnlocked) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 relative overflow-hidden">
              {isMockMode && (
                <div className="absolute top-0 left-0 right-0 bg-amber-400 text-amber-900 text-xs text-center py-1 font-bold">
                  目前為離線/本機模擬模式 (Mock Mode)
                </div>
              )}
              <div className="flex justify-center mb-6 mt-4">
                <div className="h-16 w-16 bg-blue-600 text-white rounded-full flex items-center justify-center">
                  <Icon name="ShieldAlert" size={32} />
                </div>
              </div>
              <h1 className="text-2xl font-bold text-center mb-2">B2B 報價生成系統</h1>
              <p className="text-center text-slate-500 mb-8 text-sm">企業級高載量版 - 內部銷售團隊專用</p>
              
              <button 
                onClick={handleGoogleLogin}
                className="w-full bg-white border-2 border-slate-200 text-slate-700 font-semibold py-3 px-4 rounded-xl hover:bg-slate-50 transition-colors flex items-center justify-center gap-3"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24">
                  <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                透過 Google 帳號登入
              </button>
            </div>
          </div>
        );
      }

      // 將需要的 props 傳遞給 QuotationEngine
      return <QuotationEngine products={products} loading={loading} userRole={userRole} onLogout={handleLogout} fb={fb} db={db} user={user} isMockMode={isMockMode} />;
    }

    function QuotationEngine({ products, loading, userRole, onLogout, fb, db, user, isMockMode }) {
      const [currency, setCurrency] = useState('HKD');
      const [strategy, setStrategy] = useState('Deal Reg, Registered Partner');
      const exchangeRate = currency === 'HKD' ? 7.85 : 1;
      
      const [cart, setCart] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearching, setIsSearching] = useState(false);
      const [isPreview, setIsPreview] = useState(false);
      const [resellerName, setResellerName] = useState('');
      const [endUserName, setEndUserName] = useState('');
      const [isUnofficial, setIsUnofficial] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      
      const [filterProductType, setFilterProductType] = useState(['Production']);
      const [filterProductClass, setFilterProductClass] = useState(['Product', 'Subscription', 'Support']);
      const [filterIsRenew, setFilterIsRenew] = useState('FALSE');

      const [isNoIncentive, setIsNoIncentive] = useState(false);
      const [discountType, setDiscountType] = useState('%');
      const [discountInput, setDiscountInput] = useState('');
      const [appliedOverallDiscount, setAppliedOverallDiscount] = useState({ type: '%', value: 0 });

      const searchContainerRef = useRef(null);

      useEffect(() => {
        setCart(prev => prev.map(item => ({ ...item, manualDiscount: null, manualMargin: null, manualListPrice: null })));
      }, [strategy]);

      const handleCurrencyChange = (e) => {
        const newCurrency = e.target.value;
        if (newCurrency === currency) return;

        setCart(prev => prev.map(item => {
          if (item.manualListPrice !== null) {
            let convertedPrice = item.manualListPrice;
            if (currency === 'USD' && newCurrency === 'HKD') {
              convertedPrice = item.manualListPrice * 7.85;
            } else if (currency === 'HKD' && newCurrency === 'USD') {
              convertedPrice = item.manualListPrice / 7.85;
            }
            return { ...item, manualListPrice: convertedPrice };
          }
          return item;
        }));
        setCurrency(newCurrency);
      };

      const productTypeOptions = useMemo(() => {
        const types = new Set(products.map(p => p.Product_type).filter(Boolean));
        if (!types.has('Production')) types.add('Production');
        return Array.from(types);
      }, [products]);

      const productClassOptions = useMemo(() => {
        const classes = new Set(products.map(p => p.Product_class).filter(Boolean));
        ['Product', 'Subscription', 'Support'].forEach(c => classes.add(c));
        return Array.from(classes);
      }, [products]);

      const toggleFilter = (setState, val) => {
        setState(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
      };

      const searchResults = useMemo(() => {
        if (!searchQuery.trim()) return [];
        
        const preFiltered = products.filter(p => {
          const matchType = filterProductType.length === 0 || filterProductType.includes(p.Product_type);
          const matchClass = filterProductClass.length === 0 || filterProductClass.includes(p.Product_class);
          const isRenewProduct = p.Is_Renew === true || String(p.Is_Renew).toUpperCase() === 'TRUE';
          const isFilterRenew = filterIsRenew === 'TRUE';
          const matchRenew = isRenewProduct === isFilterRenew;
          
          return matchType && matchClass && matchRenew;
        });

        const terms = searchQuery.toLowerCase().split(/\s+/).filter(Boolean);
        
        return preFiltered.filter(p => {
          const docId = (p.id || p.SKU || '').toLowerCase();
          const desc = (p.Description || '').toLowerCase();
          return terms.some(term => docId.includes(term) || desc.includes(term));
        }).slice(0, 20);
      }, [searchQuery, products, filterProductType, filterProductClass, filterIsRenew]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (searchContainerRef.current && !searchContainerRef.current.contains(event.target)) {
            setIsSearching(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const addToCart = (product) => {
        const newItemId = `${product.SKU}_${Date.now()}`;
        let initialTerm = product.Term_months !== undefined ? Number(product.Term_months) : 12;
        const skuUpper = product.SKU.toUpperCase();

        if (initialTerm > 60) initialTerm = 60;
        if (skuUpper.includes('-3YR') && initialTerm < 36) initialTerm = 36;
        if (skuUpper.includes('-5YR') && initialTerm < 60) initialTerm = 60;

        setCart(prev => [...prev, {
          id: newItemId, product, qty: 1, termMonths: initialTerm, manualDiscount: null, manualMargin: null, manualListPrice: null
        }]);
        setSearchQuery('');
        setIsSearching(false);
      };

      const removeRow = (id) => setCart(prev => prev.filter(item => item.id !== id));
      const updateRow = (id, field, value) => {
        setCart(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
      };

      const handleTermBlur = (id, sku, val) => {
        let term = parseInt(val, 10);
        if (isNaN(term)) term = 12;
        
        const skuUpper = sku.toUpperCase();
        if (term > 60) term = 60;
        if (skuUpper.includes('-3YR') && term < 36) term = 36;
        if (skuUpper.includes('-5YR') && term < 60) term = 60;

        updateRow(id, 'termMonths', term);
      };

      const handleApplyOverallDiscount = () => {
        const val = parseFloat(discountInput);
        if (!isNaN(val) && val >= 0) {
          setAppliedOverallDiscount({ type: discountType, value: val });
        } else {
          setAppliedOverallDiscount({ type: '%', value: 0 });
        }
      };

      const handleResetOverallDiscount = () => {
        setDiscountType('%');
        setDiscountInput('');
        setAppliedOverallDiscount({ type: '%', value: 0 });
      };

      const getCalculatedRow = (item) => {
        const { product, qty, termMonths, manualDiscount, manualMargin, manualListPrice } = item;
        
        let listPriceUSD = Number(product.Unit_list_price);
        if (isNaN(listPriceUSD)) listPriceUSD = 0;

        const defaultListPrice = listPriceUSD * exchangeRate;
        const listPrice = manualListPrice !== null ? manualListPrice : defaultListPrice;
        
        const defaultDiscount = product[STRATEGIES[strategy]] || 0;
        const appliedDiscount = manualDiscount !== null ? manualDiscount : defaultDiscount;
        
        let termMultiplier = 1;
        if (termMonths !== 0) {
          const skuUpper = product.SKU.toUpperCase();
          if (skuUpper.includes('-3YR')) {
            termMultiplier = termMonths / 36;
          } else if (skuUpper.includes('-5YR')) {
            termMultiplier = termMonths / 60;
          } else {
            termMultiplier = termMonths / 12;
          }
        }

        const distyCost = listPrice * (1 - appliedDiscount) * qty * termMultiplier; 
        
        const defaultMargin = strategy === 'VELOCI Program' ? (product.Disty_margin_Veloci || 0.1) : (product.Disty_margin || 0.15);
        const appliedMargin = manualMargin !== null ? manualMargin : defaultMargin;
        
        const incentiveUSD = isNoIncentive ? 0 : ((product.Incentive_coupon || 0) + (product.Incentive_gift || 0));
        const incentivePool = incentiveUSD * exchangeRate;
        
        let extendedPriceRaw = 0;
        if (appliedMargin < 1) {
          extendedPriceRaw = (distyCost / (1 - appliedMargin)) + incentivePool;
        }

        let extendedPrice = currency === 'HKD' ? Math.round(extendedPriceRaw / 10) * 10 : Math.round(extendedPriceRaw);
        return { listPrice, appliedDiscount, distyCost, appliedMargin, incentivePool, extendedPrice };
      };

      const groupedCart = useMemo(() => {
        const CLASS_ORDER = ["Product", "Support", "Subscription", "HW Accessory", "Miscellaneous"];
        
        const groups = {
          "Product": [],
          "Support": [],
          "Subscription": [],
          "HW Accessory": [],
          "Miscellaneous": [],
          "Other": []
        };

        cart.forEach(item => {
          const pClass = item.product.Product_class;
          if (groups[pClass]) {
            groups[pClass].push(item);
          } else {
            groups["Other"].push(item);
          }
        });

        const sortedItems = [];
        
        ["Product", "Support", "Subscription", "HW Accessory", "Miscellaneous", "Other"].forEach(c => {
          if (groups[c] && groups[c].length > 0) {
            sortedItems.push({ type: 'header', title: c, id: `header-${c}` });
            sortedItems.push(...groups[c].map(item => ({ type: 'item', ...item })));
          }
        });
        
        return sortedItems;
      }, [cart]);

      const subTotalAmount = cart.reduce((sum, item) => sum + getCalculatedRow(item).extendedPrice, 0);
      
      let overallDiscountAmount = 0;
      if (appliedOverallDiscount.value > 0) {
        if (appliedOverallDiscount.type === '$') {
          overallDiscountAmount = appliedOverallDiscount.value; 
        } else {
          overallDiscountAmount = subTotalAmount * (appliedOverallDiscount.value / 100);
        }
      }
      
      const totalAmount = Math.max(0, subTotalAmount - overallDiscountAmount);
      const totalBookingToVendor = cart.reduce((sum, item) => sum + getCalculatedRow(item).distyCost, 0);
      const totalOtherCost = cart.reduce((sum, item) => sum + getCalculatedRow(item).incentivePool, 0);
      const totalGrossMarginAmount = totalAmount - totalBookingToVendor - totalOtherCost;
      const totalGrossMarginPercent = totalAmount > 0 ? (totalGrossMarginAmount / totalAmount) * 100 : 0;

      // ==========================================
      // 【更新】實作寫入 Firebase 邏輯
      // ==========================================
      const saveQuotation = async () => {
        if (cart.length === 0) return;
        const timestamp = Date.now();
        const quotationData = {
          QuoteID: `QT-${timestamp}`,
          Date: new Date(timestamp).toISOString(),
          Currency: currency, AppliedStrategy: strategy,
          IsNoIncentive: isNoIncentive, OverallDiscount: appliedOverallDiscount,
          SubTotal: subTotalAmount, TotalAmount: totalAmount,
          ResellerName: resellerName || 'Unknown',
          EndUserName: endUserName || 'Unknown',
          IsUnofficial: isUnofficial,
          Items: groupedCart.filter(row => row.type === 'item').map(item => {
            const calc = getCalculatedRow(item);
            return {
              ProductClass: item.product.Product_class, 
              SKU: item.product.SKU, Description: item.product.Description, Qty: item.qty, Term: item.termMonths,
              ListPrice: calc.listPrice, Discount: calc.appliedDiscount, DistyCost: calc.distyCost,
              Margin: calc.appliedMargin, ExtendedPrice: calc.extendedPrice
            };

        // 如果在模擬模式或尚未登入，只印出在 console 並顯示提示

          setToastMessage('報價單已成功送出 (模擬模式)！請查看 Console。');
          setTimeout(() => setToastMessage(''), 3000);
          return;
        }

        try {
          // 取得 fb 中解構出來的方法
          const { collection, addDoc } = fb;
          
          // 判斷當前的 appId (符合嚴格路徑規範)
          const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'panw-quote-generator';
          
          // 寫入到個人的專屬 collections: /artifacts/{appId}/users/{userId}/quotations
          const quotationsRef = collection(db, 'artifacts', currentAppId, 'users', user.uid, 'quotations');
          
          await addDoc(quotationsRef, quotationData);
          
          setToastMessage('報價單已成功儲存至 Firebase！');
          setTimeout(() => setToastMessage(''), 3000);
        } catch (error) {
          console.error("儲存失敗:", error);
          alert("儲存報價單失敗：" + error.message);
        }
      };

      const formatMoney = (val, hideDecimals = false) => {
        return new Intl.NumberFormat('en-US', {
          style: 'currency', currency: currency, 
          minimumFractionDigits: hideDecimals ? 0 : 2, maximumFractionDigits: hideDecimals ? 0 : 2
        }).format(val);
      };

      const exportToExcel = async () => {

          groupedCart.forEach(row => {

            } else {

              const dataRow = worksheet.addRow([

                row.qty,
                row.termMonths,

                calc.extendedPrice

          totalRow.font = { bold: true, size: 12 };
          totalRow.getCell(6).numFmt = '#,##0.00';

          const buffer = await workbook.xlsx.writeBuffer();
          const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

          setToastMessage('已成功匯出具有格式的 Excel！');
          setTimeout(() => setToastMessage(''), 3000);
        } catch (error) {
          console.error("Excel Export Error:", error);
          alert("匯出 Excel 時發生錯誤: " + (error.message || error));
        }
      };

                            <td colSpan="6" className="py-2 px-4 text-xs font-bold text-slate-800 uppercase tracking-wider">

                      }

                      const item = row;

                          <td className="py-3 text-right">{formatMoney(unitPrice, true)}</td>

                        </tr>
                      )
                    })
                  )}
                </tbody>
              </table>
              <div className="flex justify-end">
                <div className="w-64 border-t-2 border-slate-800 pt-4 flex flex-col gap-2">
                  {appliedOverallDiscount.value > 0 && (
                    <>
                      <div className="flex justify-between items-center text-slate-600">
                        <span>Subtotal:</span><span>{formatMoney(subTotalAmount, true)}</span>
                      </div>
                      <div className="flex justify-between items-center text-slate-600">
                        <span>Discount ({appliedOverallDiscount.type === '%' ? `${appliedOverallDiscount.value}%` : currency}):</span>

                    <span>Total ({currency}):</span><span>{formatMoney(totalAmount, true)}</span>
                  </div>

              </div>
              <div className="mt-16 text-xs text-slate-400 text-center border-t pt-4">* This quotation is generated automatically and subject to final review. Prices are valid for 30 days.</div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col relative">
          {toastMessage && (

              <Icon name="Check" size={20} />{toastMessage}

          <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">

              <div className="flex items-center gap-6">

                    <select value={currency} onChange={handleCurrencyChange} className="bg-transparent font-bold text-sm text-slate-800 outline-none cursor-pointer">

                      {Object.keys(STRATEGIES).map(s => <option key={s} value={s}>{s}</option>)}

                <button onClick={onLogout} className="text-slate-500 hover:text-red-500 transition-colors" title="登出"><Icon name="LogOut" size={20} /></button>

          <main className="flex-1 p-6 max-w-screen-2xl mx-auto w-full">
            {/* 新增：經銷商與客戶名稱、非正式報價按鈕 */}

                <div className="relative">
                  <Icon name="Search" size={18} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                  <input type="text" value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); setIsSearching(true); }} onFocus={() => setIsSearching(true)} disabled={loading} placeholder={loading ? "載入價單資料中..." : "以空格分隔關鍵字進行 OR 搜尋 (例: pa-440 subscription)"} className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all disabled:opacity-50" />
                </div>

                {isSearching && searchQuery.trim() !== '' && (
                  <div className="absolute z-50 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl max-h-80 overflow-y-auto">
                    {searchResults.length === 0 ? (
                      <div className="p-4 text-sm text-slate-500 text-center">找不到匹配的產品 (請確認上方篩選器範圍)</div>
                    ) : (
                      searchResults.map(prod => (
                        <div key={prod.SKU} onClick={() => addToCart(prod)} className="p-3 hover:bg-blue-50 cursor-pointer border-b last:border-b-0 flex justify-between items-center group transition-colors">
                          <div>
                            <div className="font-semibold text-sm text-slate-800">{prod.SKU}</div>
                            <div className="text-xs text-slate-500 truncate max-w-md">{prod.Description}</div>
                          </div>
                          <div className="flex items-center gap-3">
                            <span className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded">{prod.Product_type}</span>
                            <Icon name="Plus" size={16} className="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="bg-slate-50 text-slate-500 text-[11px] uppercase border-b border-slate-200">
                    <tr>
                      <th className="px-4 py-3 font-semibold w-56">SKU / 描述</th>
                      <th className="px-4 py-3 font-semibold text-right">UNIT LIST PRICE<br/>({currency})</th>
                      <th className="px-4 py-3 font-semibold text-center w-24">DISCOUNT<br/>(可覆寫)</th>
                      <th className="px-4 py-3 font-semibold text-right">DISTY COST<br/>({currency})</th>
                      <th className="px-4 py-3 font-semibold text-center w-16">QTY</th>
                      <th className="px-4 py-3 font-semibold text-center w-16">TERM (MONTHS)</th>
                      <th className="px-4 py-3 font-semibold text-center w-24">MARGIN<br/>(可覆寫)</th>
                      <th className="px-4 py-3 font-semibold text-right">INCENTIVE<br/>({currency})</th>
                      <th className="px-4 py-3 font-semibold text-right bg-blue-50 text-blue-800">RESELLER EXTENDED PRICE<br/>({currency})</th>
                      <th className="px-2 py-3 text-center"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {cart.length === 0 ? (
                      <tr>
                        <td colSpan="10" className="px-6 py-16 text-center text-slate-400">
                          <div className="flex flex-col items-center justify-center">
                            <Icon name="Search" size={32} className="mb-2 opacity-50"/>
                            <p>報價單目前為空，請從上方搜尋框新增產品。</p>
                          </div>
                        </td>
                      </tr>
                    ) : (
                      groupedCart.map((row, idx) => {
                        if (row.type === 'header') {
                          return (
                            <tr key={row.id} className="bg-slate-200/60 border-y border-slate-300">
                              <td colSpan="10" className="px-4 py-2 text-[11px] font-bold text-slate-700 tracking-wider uppercase">
                                {row.title}
                              </td>
                            </tr>
                          );
                        }

                        const item = row;
                        const calc = getCalculatedRow(item);
                        return (
                          <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                            <td className="px-4 py-3">
                              <div className="font-semibold text-slate-800 text-xs">{item.product.SKU}</div>
                              <div className="text-[11px] text-slate-500 max-w-[180px] truncate" title={item.product.Description}>{item.product.Description}</div>
                              <div className="text-[9px] bg-slate-200 inline-block px-1 rounded mt-1 text-slate-600">{item.product.Product_type}</div>
                            </td>
                            
                            <td className="px-4 py-3 text-right">
                              <div className="flex items-center justify-end gap-1">
                                <span className="text-slate-500 font-bold text-xs">{currency === 'USD' ? '$' : 'HK$'}</span>
                                <input type="number" step="0.01" min="0"
                                  disabled={!isNaN(Number(item.product.Unit_list_price))}
                                  className={`w-[72px] border border-slate-300 rounded p-1 text-[11px] text-right focus:border-blue-500 outline-none ${!isNaN(Number(item.product.Unit_list_price)) ? 'bg-slate-100 text-slate-500 cursor-not-allowed' : 'bg-white'}`}
                                  value={item.manualListPrice !== null ? item.manualListPrice : calc.listPrice}
                                  onChange={(e) => updateRow(item.id, 'manualListPrice', e.target.value === '' ? null : parseFloat(e.target.value))}
                                />
                              </div>
                            </td>

                            <td className="px-4 py-3 text-center">
                              <div className="flex items-center justify-center gap-1">
                                <input type="number" step="0.1" min="0" max="100"
                                  className="w-[52px] bg-white border border-slate-300 rounded p-1 text-[11px] text-right focus:border-blue-500 outline-none"
                                  value={Number(((item.manualDiscount !== null ? item.manualDiscount : calc.appliedDiscount) * 100).toFixed(2))}
                                  onChange={(e) => updateRow(item.id, 'manualDiscount', e.target.value === '' ? null : parseFloat(e.target.value) / 100)}
                                />
                                <span className="text-slate-500 font-bold text-xs">%</span>
                              </div>
                            </td>
                            <td className="px-4 py-3 text-right text-slate-600 font-mono text-xs">{formatMoney(calc.distyCost)}</td>
                            <td className="px-4 py-3 text-center">
                              <input type="number" min="1" className="w-[44px] bg-white border border-slate-300 rounded p-1 text-[11px] text-center focus:border-blue-500 outline-none"
                                value={item.qty} onChange={(e) => updateRow(item.id, 'qty', parseInt(e.target.value) || 1)} />
                            </td>
                            <td className="px-4 py-3 text-center">
                              <input type="number" min="0" max="60" 
                                disabled={Number(item.product.Term_months || 0) === 0}
                                className={`w-[44px] border border-slate-300 rounded p-1 text-[11px] text-center focus:border-blue-500 outline-none ${Number(item.product.Term_months || 0) === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white'}`}
                                value={item.termMonths === '' ? '' : item.termMonths} 
                                onChange={(e) => updateRow(item.id, 'termMonths', e.target.value)} 
                                onBlur={(e) => handleTermBlur(item.id, item.product.SKU, e.target.value)}
                              />
                            </td>
                            <td className="px-4 py-3 text-center">
                               <div className="flex items-center justify-center gap-1">
                                 <input type="number" step="0.1" min="0" max="100"
                                    className="w-[52px] bg-white border border-slate-300 rounded p-1 text-[11px] text-right focus:border-blue-500 outline-none"
                                    value={Number(((item.manualMargin !== null ? item.manualMargin : calc.appliedMargin) * 100).toFixed(2))}
                                    onChange={(e) => updateRow(item.id, 'manualMargin', e.target.value === '' ? null : parseFloat(e.target.value) / 100)}
                                  />
                                  <span className="text-slate-500 font-bold text-xs">%</span>
                               </div>
                            </td>
                            <td className="px-4 py-3 text-right text-slate-600 font-mono text-xs">{calc.incentivePool > 0 ? formatMoney(calc.incentivePool) : '-'}</td>
                            <td className="px-4 py-3 text-right font-bold text-blue-700 bg-blue-50/50 font-mono text-sm">{formatMoney(calc.extendedPrice, true)}</td>
                            <td className="px-2 py-3 text-center">
                              <button onClick={() => removeRow(item.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1"><Icon name="Trash2" size={16} /></button>
                            </td>
                          </tr>
                        );
                      })
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="flex justify-between items-start">
              <div className="flex gap-3 mt-1">
                <button onClick={() => setIsPreview(true)} disabled={cart.length === 0} className="bg-white border-2 border-slate-200 text-slate-700 font-semibold px-6 py-2.5 rounded-lg hover:border-slate-300 hover:bg-slate-50 transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                  <Icon name="Printer" size={18} /> 預覽 / 列印 PDF
                </button>
                <button onClick={saveQuotation} disabled={cart.length === 0} className="bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-all flex items-center gap-2 shadow-sm shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed">
                  <Icon name="Save" size={18} /> 儲存紀錄 (GAS)
                </button>
              </div>

              <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 min-w-[360px] flex flex-col gap-3">
                {appliedOverallDiscount.value > 0 && (
                  <>
                    <div className="flex justify-between items-center text-slate-500 pb-2 border-b border-slate-100">
                      <span className="text-[11px] font-semibold uppercase tracking-wider">Subtotal</span>
                      <span className="text-lg font-mono font-medium">{formatMoney(subTotalAmount, true)}</span>
                    </div>
                    <div className="flex justify-between items-center text-red-500 pb-2 border-b border-slate-100">
                      <span className="text-[11px] font-semibold uppercase tracking-wider">Overall Discount ({appliedOverallDiscount.type === '%' ? `${appliedOverallDiscount.value}%` : currency})</span>
                      <span className="text-lg font-mono font-medium">-{formatMoney(overallDiscountAmount, true)}</span>
                    </div>
                  </>
                )}

                <div className="flex justify-between items-center">
                  <div className="text-sm font-semibold text-slate-500 uppercase tracking-wider">總金額 Total Amount</div>
                  <div className="text-3xl font-bold text-slate-800 tracking-tight font-mono">{formatMoney(totalAmount, true)}</div>
                </div>
                
                <div className="border-t border-slate-100 pt-3 flex flex-col gap-2">
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide">BOOKING TO VENDOR ({currency})</span>
                    <span className="text-xs font-mono font-medium text-slate-700">{formatMoney(totalBookingToVendor, true)}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide">OTHER COST ({currency})</span>
                    <span className="text-xs font-mono font-medium text-slate-700">{formatMoney(totalOtherCost, true)}</span>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide">GROSS MARGIN ({currency})</span>
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-mono font-bold text-slate-800">{formatMoney(totalGrossMarginAmount, true)}</span>
                      <span className="text-[10px] font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded">
                        ({totalGrossMarginPercent.toFixed(1)}%)
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    let isAppRendered = false;
    const mountReactApp = () => {
      if (isAppRendered) return;
      isAppRendered = true;
      const loadingEl = document.getElementById('loading');
      if (loadingEl) loadingEl.style.display = 'none';
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App fb={window.FirebaseLib} />);
    };

    window.addEventListener('firebase-loaded', mountReactApp);
    window.addEventListener('firebase-failed', mountReactApp);

    setTimeout(() => {
      if (!isAppRendered) {
        console.warn("模組載入逾時，強制以模擬模式啟動。");
        mountReactApp();
      }
    }, 2500);
  </script>
</body>
</html>
